# Authority index — concept → module → tables → operator surface → proving tests.
#
# Maintained by hand. Tested by `tests/unit/test_authority_index_contract.py`,
# which fails CI if any path or test reference goes stale.
#
# Add a row when you introduce a new domain concept that operators or future
# readers might need to find. Keep entries terse — this is an index, not docs.
#
- concept: workflow_runs
  authority_module: Code&DBs/Workflow/runtime/workflow/orchestrator.py
  storage_tables: [workflow_runs, workflow_jobs]
  cli: praxis workflow run
  mcp: praxis_workflow
  proving_tests:
    - Code&DBs/Workflow/tests/integration/test_first_slice_end_to_end.py

- concept: evidence
  authority_module: Code&DBs/Workflow/receipts/evidence.py
  storage_tables: [workflow_events, receipts]
  cli: praxis workflow inspect-job
  mcp: praxis_workflow
  proving_tests:
    - Code&DBs/Workflow/tests/contracts/test_evidence_contracts.py
    - Code&DBs/Workflow/tests/contracts/test_inspect_replay_contracts.py

- concept: claims
