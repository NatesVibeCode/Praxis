services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: praxis
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d praxis"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
