services:
  # Canonical Postgres is the host's launchd instance at
  # postgresql://nate@host.docker.internal:5432/praxis (data dir
  # Code&DBs/Databases/postgres-dev/data). The old bundled postgres service
  # has been removed because it split-brained with launchd.
  semantic-backend:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: semantic_backend
    image: praxis-semantic-backend:latest
    env_file:
      - .env
    environment:
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_SEMANTIC_HOST: 0.0.0.0
      PRAXIS_SEMANTIC_PORT: 8421
      WORKFLOW_EMBEDDING_BACKEND: local
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - python3
      - -m
      - runtime.embedding_backend_server
      - --host
      - 0.0.0.0
      - --port
      - "8421"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8421/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  api-server:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: api_server
    image: praxis-api:latest
    depends_on:
      semantic-backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://nate@host.docker.internal:5432/praxis
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_API_HOST: 0.0.0.0
      PRAXIS_API_PORT: 8420
      PRAXIS_API_RELOAD: "0"
      # Integration secrets hydrated from host Keychain at compose-up time
      # (bin/praxis-compose-env exports account="praxis" services into shell).
      # The MCP bridge runs inside this container, so integration HTTP calls
      # from workers (via host.docker.internal:8420/mcp → praxis_integration)
      # need these present in the container env. Keychain is unreachable from
      # Linux, so this passthrough is the single authorized hydration channel.
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTPBIN_DEMO_TOKEN: ${HTTPBIN_DEMO_TOKEN:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Provider auth single-authority: blank stale Anthropic API key so the
      # OAuth subscription rail (CLAUDE_CODE_OAUTH_TOKEN) wins if the bridge
      # ever spawns Anthropic-authenticated calls. See
      # architecture-policy::providers::provider-auth-mode-single-authority.
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - sh
      - -c
      - exec python3 -m surfaces.api.server --host "$${PRAXIS_API_HOST}" --port "$${PRAXIS_API_PORT}" --no-reload
    ports:
      - "8420:8420"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${PRAXIS_API_PORT}/api/health\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  scheduler:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: scheduler
    image: praxis-scheduler:latest
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://nate@host.docker.internal:5432/praxis
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - python3
      - -m
      - runtime.praxis_supervisor
      - --repo-root
      - /workspace
      - component
      - scheduler
    restart: unless-stopped
  workflow-worker:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-worker.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: workflow_worker
    image: praxis-worker:latest
    depends_on:
      semantic-backend:
        condition: service_healthy
      api-server:
        condition: service_healthy
      scheduler:
        condition: service_started
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://nate@host.docker.internal:5432/praxis
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_CLI_AUTH_HOME: /Users/nate
      PRAXIS_WORKFLOW_MCP_URL: http://host.docker.internal:8420/mcp
      # Single Anthropic auth authority: ~/.claude/.credentials.json is
      # mounted into the worker and is the only source of truth. We blank
      # every env-based Anthropic auth rail so the CLI cannot pick up a
      # stale shell or .env token that drifts from the credentials file.
      # See architecture-policy::providers::provider-auth-mode-single-authority.
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
      CLAUDE_CODE_OAUTH_TOKEN: ""
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /Users/nate/.codex:/root/.codex:ro
      - /Users/nate/.gemini:/root/.gemini:ro
      - /Users/nate/.claude.json:/root/.claude.json:ro
      - /Users/nate/.claude/.credentials.json:/root/.claude/.credentials.json
      - /var/run/docker.sock:/var/run/docker.sock
      # Share host /tmp with worker so sandbox temp dirs (created by the
      # worker via tempfile.mkdtemp) are visible both sides: host-side
      # ephemeral CLI containers bind-mount from these paths, and worker
      # must read them back for _dehydrate_copy after exec.
      - /tmp:/tmp
    command:
      - python3
      - -m
      - runtime.workflow_worker
    restart: unless-stopped
