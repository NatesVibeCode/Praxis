services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: praxis
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=400
      - -c
      - shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d praxis"]
      interval: 5s
      timeout: 5s
      retries: 5
  semantic-backend:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: semantic_backend
    image: praxis-semantic-backend:latest
    env_file:
      - .env
    environment:
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_SEMANTIC_HOST: 0.0.0.0
      PRAXIS_SEMANTIC_PORT: 8421
      WORKFLOW_EMBEDDING_BACKEND: local
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - python3
      - -m
      - runtime.embedding_backend_server
      - --host
      - 0.0.0.0
      - --port
      - "8421"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8421/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  api-server:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: api_server
    image: praxis-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      semantic-backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://postgres@postgres:5432/praxis
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_API_HOST: 0.0.0.0
      PRAXIS_API_PORT: 8420
      PRAXIS_API_RELOAD: "0"
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - python3
      - -m
      - surfaces.api.server
      - --host
      - 0.0.0.0
      - --port
      - "8420"
      - --no-reload
    ports:
      - "8420:8420"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8420/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  scheduler:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: scheduler
    image: praxis-scheduler:latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://postgres@postgres:5432/praxis
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - python3
      - -m
      - runtime.praxis_supervisor
      - --repo-root
      - /workspace
      - component
      - scheduler
    restart: unless-stopped
  workflow-worker:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-worker.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: workflow_worker
    image: praxis-worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      semantic-backend:
        condition: service_healthy
      api-server:
        condition: service_healthy
      scheduler:
        condition: service_started
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: postgresql://postgres@postgres:5432/praxis
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      PYTHONPATH: "/workspace/Code&DBs/Workflow"
      PRAXIS_CLI_AUTH_HOME: /Users/nate
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /Users/nate/.codex:/root/.codex:ro
      - /Users/nate/.gemini:/root/.gemini:ro
      - /Users/nate/.claude.json:/root/.claude.json:ro
      - /Users/nate/.claude/.credentials.json:/root/.claude/.credentials.json
      - /var/run/docker.sock:/var/run/docker.sock
      # Share host /tmp with worker so sandbox temp dirs (created by the
      # worker via tempfile.mkdtemp) are visible both sides: host-side
      # ephemeral CLI containers bind-mount from these paths, and worker
      # must read them back for _dehydrate_copy after exec.
      - /tmp:/tmp
    command:
      - python3
      - -m
      - runtime.workflow_worker
    restart: unless-stopped
volumes:
  pgdata:
