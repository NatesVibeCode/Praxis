services:
  # Canonical Postgres is external to this compose stack. Set
  # WORKFLOW_DATABASE_URL in .env or the shell; this may point at host-local
  # Postgres, another LAN machine, or any reachable Postgres 16+ pgvector DB.
  # The old bundled postgres service was removed because it split-brained with
  # the operator-owned database authority.
  #
  # pgbouncer fronts Postgres for every container. Each container's
  # WORKFLOW_DATABASE_URL points at pgbouncer (via PRAXIS_DOCKER_WORKFLOW_DATABASE_URL
  # in .env), and pgbouncer multiplexes those onto a small upstream pool
  # against the real Postgres at PRAXIS_PGBOUNCER_UPSTREAM_URL.
  # Standing-order ref: BUG-D7A939CA — Postgres saturation when every
  # container holds its own asyncpg pool. Transaction-pool mode lets us
  # cap real Postgres backends at DEFAULT_POOL_SIZE while serving
  # MAX_CLIENT_CONN client connections.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: ${PRAXIS_PGBOUNCER_UPSTREAM_URL:?PRAXIS_PGBOUNCER_UPSTREAM_URL must be set in .env (the upstream Postgres URL from container view, usually postgresql://praxis:PW@host.docker.internal:5432/praxis)}
      LISTEN_PORT: "6432"
      # session mode (not transaction): asyncpg caches prepared statements
      # client-side; transaction-mode pgbouncer routes queries to different
      # upstream backends across statements, breaking cached statement state
      # (observed: UUID arg encoded by timestamptz codec → TypeError on
      # compose_and_launch). Session mode gives each client a sticky
      # upstream conn — we still bound total upstream conns via
      # DEFAULT_POOL_SIZE, just without the multiplexing.
      POOL_MODE: session
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      MAX_CLIENT_CONN: "1000"
      AUTH_TYPE: scram-sha-256
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    ports:
      - "6432:6432"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U praxis || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  semantic-backend:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: semantic_backend
        PRAXIS_CONTAINER_WORKSPACE_ROOT: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
        PRAXIS_CONTAINER_HOME: ${PRAXIS_CONTAINER_HOME:-/home/praxis-agent}
    image: praxis-semantic-backend:latest
    env_file:
      - .env
    environment:
      PYTHONPATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/Code&DBs/Workflow"
      PRAXIS_WORKSPACE_BASE_PATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}"
      PRAXIS_SEMANTIC_HOST: 0.0.0.0
      PRAXIS_SEMANTIC_PORT: 8421
      WORKFLOW_EMBEDDING_BACKEND: local
    working_dir: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    volumes:
      - .:${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    command:
      - python3
      - -m
      - runtime.embedding_backend_server
      - --host
      - 0.0.0.0
      - --port
      - "8421"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8421/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  api-server:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: api_server
        PRAXIS_CONTAINER_WORKSPACE_ROOT: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
        PRAXIS_CONTAINER_HOME: ${PRAXIS_CONTAINER_HOME:-/home/praxis-agent}
    image: praxis-api:latest
    depends_on:
      semantic-backend:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: ${PRAXIS_DOCKER_WORKFLOW_DATABASE_URL:-${WORKFLOW_DATABASE_URL:?WORKFLOW_DATABASE_URL must be set}}
      WORKFLOW_POOL_MIN_SIZE: ${PRAXIS_API_WORKFLOW_POOL_MIN_SIZE:-1}
      WORKFLOW_POOL_MAX_SIZE: ${PRAXIS_API_WORKFLOW_POOL_MAX_SIZE:-8}
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      PYTHONPATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/Code&DBs/Workflow"
      PRAXIS_WORKSPACE_BASE_PATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}"
      PRAXIS_API_HOST: 0.0.0.0
      PRAXIS_API_PORT: 8420
      PRAXIS_API_RELOAD: "0"
      # Enable the LLM compile path (DeepSeek V4-Pro via OpenRouter per
      # migrations 243+246). When unset, runtime/compiler.py falls through to
      # the deterministic compile that leaves typed slugs unresolved and the
      # builder lands the user on a workflow with empty bindings/imports.
      WORKFLOW_COMPILER_ENABLE_LLM: ${WORKFLOW_COMPILER_ENABLE_LLM:-1}
      PRAXIS_OPERATOR_DEV_MODE: ${PRAXIS_OPERATOR_DEV_MODE:-0}
      PRAXIS_API_TOKEN: ${PRAXIS_API_TOKEN:-}
      PRAXIS_CLI_AUTH_HOME: ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}
      PRAXIS_WORKFLOW_MCP_SIGNING_SECRET: ${PRAXIS_WORKFLOW_MCP_SIGNING_SECRET:?PRAXIS_WORKFLOW_MCP_SIGNING_SECRET must be set}
      # Integration secrets hydrated from host Keychain at compose-up time
      # (bin/praxis-compose-env exports account="praxis" services into shell).
      # The MCP bridge runs inside this container, so integration HTTP calls
      # from workers (by default via host.docker.internal:8420/mcp →
      # praxis_integration; override PRAXIS_WORKFLOW_MCP_URL when needed)
      # need these present in the container env. Keychain is unreachable from
      # Linux, so this passthrough is the single authorized hydration channel.
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTPBIN_DEMO_TOKEN: ${HTTPBIN_DEMO_TOKEN:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      ARTIFICIAL_ANALYSIS_API_KEY: ${ARTIFICIAL_ANALYSIS_API_KEY:-}
      # Provider auth single-authority: blank stale Anthropic API-key rails so
      # the OAuth subscription rail (CLAUDE_CODE_OAUTH_TOKEN) wins if the bridge
      # ever spawns Anthropic-authenticated calls. See
      # architecture-policy::providers::provider-auth-mode-single-authority.
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      PRAXIS_AGENT_CWD: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      PRAXIS_AGENT_SESSIONS_RUNNER_URL: ${PRAXIS_AGENT_SESSIONS_RUNNER_URL:-}
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    working_dir: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    volumes:
      - .:${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.codex:/root/.codex
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.gemini:/root/.gemini
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.claude/.credentials.json:/root/.claude/.credentials.json
    command:
      - sh
      - -c
      - exec python3 -m surfaces.api.server --host "$${PRAXIS_API_HOST}" --port "$${PRAXIS_API_PORT}" --no-reload
    ports:
      - "8420:8420"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${PRAXIS_API_PORT}/api/health\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  # praxis-agentd — local broker for CLI/MCP traffic.
  #
  # Transport, not authority. Reuses the canonical MCP path
  # (handle_request → invoke_tool → operation_catalog_gateway), exposes:
  #   GET  /health  liveness probe
  #   POST /rpc     host bin/praxis-agent dispatch (broker token)
  #   POST /mcp     workflow-worker MCP traffic (signed token OR broker token)
  #
  # Why a separate service: the api-server stays for human-facing REST/Moon
  # surfaces; the broker takes the agent + worker MCP traffic so "API got
  # stuck" does not equal "every CLI agent and every worker MCP call wedged".
  # Standing-order ref: architecture-policy::auth::via-docker-creds-not-shell.
  agent-broker:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: api_server
        PRAXIS_CONTAINER_WORKSPACE_ROOT: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
        PRAXIS_CONTAINER_HOME: ${PRAXIS_CONTAINER_HOME:-/home/praxis-agent}
    image: praxis-api:latest
    depends_on:
      semantic-backend:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: ${PRAXIS_DOCKER_WORKFLOW_DATABASE_URL:-${WORKFLOW_DATABASE_URL:?WORKFLOW_DATABASE_URL must be set}}
      WORKFLOW_POOL_MIN_SIZE: ${PRAXIS_AGENT_BROKER_WORKFLOW_POOL_MIN_SIZE:-1}
      WORKFLOW_POOL_MAX_SIZE: ${PRAXIS_AGENT_BROKER_WORKFLOW_POOL_MAX_SIZE:-4}
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      PYTHONPATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/Code&DBs/Workflow"
      PRAXIS_WORKSPACE_BASE_PATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}"
      PRAXIS_AGENT_BROKER_HOST: 0.0.0.0
      PRAXIS_AGENT_BROKER_PORT: "8422"
      PRAXIS_AGENT_BROKER_STATE_DIR: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/artifacts/agent-broker"
      WORKFLOW_COMPILER_ENABLE_LLM: ${WORKFLOW_COMPILER_ENABLE_LLM:-1}
      PRAXIS_OPERATOR_DEV_MODE: ${PRAXIS_OPERATOR_DEV_MODE:-0}
      PRAXIS_CLI_AUTH_HOME: ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}
      PRAXIS_WORKFLOW_MCP_SIGNING_SECRET: ${PRAXIS_WORKFLOW_MCP_SIGNING_SECRET:?PRAXIS_WORKFLOW_MCP_SIGNING_SECRET must be set}
      # Integration secrets — same hydration channel as api-server. The
      # broker dispatches through the same MCP catalog so any tool that
      # touches an external API (Brave, HubSpot, OpenRouter, etc.) needs
      # these in the broker's container env, not the host shell.
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HTTPBIN_DEMO_TOKEN: ${HTTPBIN_DEMO_TOKEN:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      ARTIFICIAL_ANALYSIS_API_KEY: ${ARTIFICIAL_ANALYSIS_API_KEY:-}
      # Same provider auth single-authority posture as api-server.
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      PRAXIS_AGENT_CWD: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      PRAXIS_AGENT_SESSIONS_RUNNER_URL: ${PRAXIS_AGENT_SESSIONS_RUNNER_URL:-}
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    working_dir: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    volumes:
      - .:${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.codex:/root/.codex
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.claude/.credentials.json:/root/.claude/.credentials.json
    command:
      - python3
      - -m
      - surfaces.agent_broker.server
      - --host
      - "0.0.0.0"
      - --port
      - "8422"
    ports:
      - "127.0.0.1:8422:8422"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8422/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  scheduler:
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-control.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: scheduler
        PRAXIS_CONTAINER_WORKSPACE_ROOT: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
        PRAXIS_CONTAINER_HOME: ${PRAXIS_CONTAINER_HOME:-/home/praxis-agent}
    image: praxis-scheduler:latest
    depends_on:
      pgbouncer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: ${PRAXIS_DOCKER_WORKFLOW_DATABASE_URL:-${WORKFLOW_DATABASE_URL:?WORKFLOW_DATABASE_URL must be set}}
      WORKFLOW_POOL_MIN_SIZE: ${PRAXIS_SCHEDULER_WORKFLOW_POOL_MIN_SIZE:-1}
      WORKFLOW_POOL_MAX_SIZE: ${PRAXIS_SCHEDULER_WORKFLOW_POOL_MAX_SIZE:-2}
      PYTHONPATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/Code&DBs/Workflow"
      PRAXIS_WORKSPACE_BASE_PATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}"
    working_dir: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    volumes:
      - .:${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - python3
      - -m
      - runtime.praxis_supervisor
      - --repo-root
      - ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      - component
      - scheduler
    restart: unless-stopped
  workflow-worker:
    profiles:
      - worker
    build:
      context: ./Code&DBs/Workflow
      dockerfile: docker/praxis-worker.Dockerfile
      args:
        PRAXIS_DEPENDENCY_SCOPE: workflow_worker
        PRAXIS_CONTAINER_WORKSPACE_ROOT: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
        PRAXIS_CONTAINER_HOME: ${PRAXIS_CONTAINER_HOME:-/home/praxis-agent}
    image: praxis-worker:latest
    depends_on:
      semantic-backend:
        condition: service_healthy
      agent-broker:
        condition: service_healthy
      scheduler:
        condition: service_started
      pgbouncer:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WORKFLOW_DATABASE_URL: ${PRAXIS_DOCKER_WORKFLOW_DATABASE_URL:-${WORKFLOW_DATABASE_URL:?WORKFLOW_DATABASE_URL must be set}}
      WORKFLOW_POOL_MIN_SIZE: ${PRAXIS_WORKER_WORKFLOW_POOL_MIN_SIZE:-1}
      WORKFLOW_POOL_MAX_SIZE: ${PRAXIS_WORKER_WORKFLOW_POOL_MAX_SIZE:-4}
      WORKFLOW_EMBEDDING_BACKEND: service
      WORKFLOW_EMBEDDING_SERVICE_URL: http://semantic-backend:8421
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      ARTIFICIAL_ANALYSIS_API_KEY: ${ARTIFICIAL_ANALYSIS_API_KEY:-}
      PYTHONPATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}/Code&DBs/Workflow"
      PRAXIS_WORKSPACE_BASE_PATH: "${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}"
      # Sandbox capacity: empirical peak RSS of a real CLI+MCP sandbox is
      # ~230 MB (measured 2026-04-21 on Dell with two active agent jobs).
      # 500 MB gives ~2x headroom over observed peak. The old 4 GB default
      # came from the fat-image era when sandboxes loaded the full Praxis
      # Python runtime; under the sealed-submission contract the sandbox is
      # just a CLI + MCP client shuttling bytes to remote inference.
      PRAXIS_DOCKER_MEMORY: ${PRAXIS_DOCKER_MEMORY:-500m}
      # Operator diagnostic hook. Set to "1" only when inspecting a failing
      # sandbox spawn; normal workers should not dump docker-run invocations.
      PRAXIS_SANDBOX_DEBUG: ${PRAXIS_SANDBOX_DEBUG:-0}
      # Optional live-edit overlay for bin/praxis_sandbox_client.py. Leave
      # empty for image-pinned worker operation; set explicitly when doing
      # operator instrumentation on a trusted host checkout.
      PRAXIS_HOST_WORKSPACE_ROOT: ${PRAXIS_HOST_WORKSPACE_ROOT:-}
      # Optional explicit operator override. Leave empty by default so the
      # worker runtime derives local slots from visible CPU and memory.
      PRAXIS_WORKER_MAX_PARALLEL: ${PRAXIS_WORKER_MAX_PARALLEL:-}
      PRAXIS_CLI_AUTH_HOME: ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}
      PRAXIS_WORKFLOW_MCP_URL: ${PRAXIS_WORKFLOW_MCP_URL:-http://host.docker.internal:8422/mcp}
      PRAXIS_WORKFLOW_MCP_SIGNING_SECRET: ${PRAXIS_WORKFLOW_MCP_SIGNING_SECRET:?PRAXIS_WORKFLOW_MCP_SIGNING_SECRET must be set}
      # Anthropic in the worker is a noninteractive Linux consumer of a macOS
      # host login. The durable auth rail is the Keychain-derived
      # CLAUDE_CODE_OAUTH_TOKEN exported by bin/praxis-compose-env; stale API-key
      # rails stay blank so Claude cannot drift onto the wrong authority.
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_AUTH_TOKEN: ""
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    working_dir: ${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
    volumes:
      - .:${PRAXIS_CONTAINER_WORKSPACE_ROOT:-/workspace}
      # Codex/Gemini auth dirs mounted read-write: the CLIs need to write
      # session caches, model caches, and skills dirs at runtime. With :ro
      # they fail with "Read-only file system" before producing any output.
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.codex:/root/.codex
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.gemini:/root/.gemini
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.claude/.credentials.json:/root/.claude/.credentials.json
      # Cursor CLI auth state (single-file mount, matches .claude.json pattern).
      # Host is currently not logged in (cursor-agent status -> "Not logged in")
      # so this mount is a no-op until `cursor-agent login` runs on host.
      - ${PRAXIS_CLI_AUTH_HOME:-${HOME:?HOME must be set}}/.cursor/agent-cli-state.json:/root/.cursor/agent-cli-state.json:ro
      - ${PRAXIS_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${PRAXIS_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      # Share host /tmp with worker so sandbox temp dirs (created by the
      # worker via tempfile.mkdtemp) are visible both sides: host-side
      # ephemeral CLI containers bind-mount from these paths, and worker
      # must read them back for _dehydrate_copy after exec.
      - /tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - python3
      - -m
      - surfaces.cli.main
      - queue
      - worker
    # Healthcheck: prove the LLM CLIs we route to are actually authenticated.
    # The worker container can be "Up" while every Anthropic call returns 401
    # — we just spent a session learning how silently that fails (worker
    # claimed jobs, jobs ran 100+ seconds, returned exit_code=0 with 0 tokens
    # because the LLM call rejected, then auto-seal sealed empty submissions
    # as "no-change completions"). The healthcheck here is the structural
    # gate: if claude can't auth, the container is unhealthy, dependent
    # services see it, firecheck halts admission.
    #
    # We only probe claude (CLAUDE_CODE_OAUTH_TOKEN, the rail most likely to
    # go stale across recreates). Codex/Gemini auth lives in mounted dirs
    # that survive recreate, so they don't have the same hydration cliff.
    # Standing-order ref: architecture-policy::auth::via-docker-creds-not-shell
    healthcheck:
      test: ["CMD-SHELL", "claude auth status --json 2>/dev/null | python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); sys.exit(0 if d.get(\"loggedIn\") is True else 1)'"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
    restart: unless-stopped
