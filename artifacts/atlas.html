<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Praxis System Atlas</title>
<script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
  :root {
    --bg: #16161e;
    --bg-panel: #1a1b26;
    --bg-elev: #1f2335;
    --border: #292e42;
    --text: #c0caf5;
    --text-dim: #565f89;
    --accent: #7aa2f7;
  }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  #app { display: grid; grid-template-columns: 240px 1fr 300px; grid-template-rows: 44px 1fr; height: 100vh; }
  header { grid-column: 1 / 4; padding: 0 18px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 18px; }
  header h1 { font-size: 14px; margin: 0; font-weight: 500; letter-spacing: 0.3px; }
  header .counts { font-size: 11px; color: var(--text-dim); font-family: ui-monospace, monospace; }
  header .hint { font-size: 11px; color: var(--text-dim); font-style: italic; }
  #sidebar { background: var(--bg-panel); padding: 14px; overflow-y: auto; border-right: 1px solid var(--border); font-size: 12px; }
  #sidebar h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin: 14px 0 6px; font-weight: 600; }
  #sidebar h2:first-child { margin-top: 0; }
  #sidebar label { display: flex; align-items: center; padding: 3px 0; cursor: pointer; gap: 7px; }
  #sidebar label:hover { color: white; }
  #sidebar input[type=search] { width: 100%; padding: 6px 9px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; box-sizing: border-box; outline: none; }
  #sidebar input[type=search]:focus { border-color: var(--accent); }
  .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .edge-swatch { width: 22px; height: 2px; display: inline-block; flex-shrink: 0; position: relative; }
  .edge-swatch.dashed { background: transparent; border-top: 2px dashed currentColor; height: 0; }
  .edge-swatch.dotted { background: transparent; border-top: 2px dotted currentColor; height: 0; }
  #cy { background: var(--bg); width: 100%; height: 100%; }
  #detail { background: var(--bg-panel); padding: 14px; border-left: 1px solid var(--border); overflow-y: auto; font-size: 12px; }
  #detail h2 { font-size: 14px; margin: 0 0 6px; font-weight: 500; }
  #detail .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  #detail .tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: var(--bg-elev); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
  #detail .tag.area { color: var(--accent); }
  #detail .src { color: var(--text-dim); font-size: 10px; margin-bottom: 10px; font-family: ui-monospace, monospace; word-break: break-all; }
  #detail pre { white-space: pre-wrap; word-break: break-word; font-size: 11px; background: var(--bg); padding: 9px; border-radius: 5px; max-height: 260px; overflow-y: auto; border: 1px solid var(--border); line-height: 1.5; }
  #detail .empty { color: var(--text-dim); font-style: italic; font-size: 12px; }
  #detail .neighbors { margin-top: 14px; }
  #detail .neighbors .nrow { padding: 4px 0; font-size: 11px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #detail .neighbors .nrow:hover { color: white; }
  button { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); padding: 5px 9px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  button:hover { background: var(--border); color: white; }
  .toolbar { margin-left: auto; display: flex; gap: 6px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Praxis System Atlas</h1>
    <span class="counts" id="counts"></span>
    <span class="hint" id="mode-hint">click an area to expand</span>
    <div class="toolbar">
      <button id="btn-expand-all">Expand all</button>
      <button id="btn-collapse-all">Collapse all</button>
      <button id="btn-fit">Fit</button>
      <button id="btn-relayout">Re-layout</button>
      <button id="btn-labels">Labels: auto</button>
    </div>
  </header>
  <aside id="sidebar">
    <h2>Search</h2>
    <input type="search" id="search" placeholder="name or id…">
    <h2>Relations</h2>
    <div id="relation-filters"></div>
    <h2>Areas</h2>
    <div id="area-filters"></div>
    <h2>Types</h2>
    <div id="type-filters"></div>
  </aside>
  <div id="cy"></div>
  <aside id="detail">
    <p class="empty">Click a node to inspect.<br><br>Hover a node to focus its neighborhood.</p>
  </aside>
</div>

: "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "roadmap_item::roadmap_item.phase_program.build_closure.phase_086", "label": "roadmap_item.phase_program.build_closure.phase_086", "type": "roadmap_item", "area": "roadmap", "preview": "", "source": "authority_projection", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "roadmap_item::roadmap_item.phase_program.build_closure.phase_090", "label": "roadmap_item.phase_program.build_closure.phase_090", "type": "roadmap_item", "area": "roadmap", "preview": "", "source": "authority_projection", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "roadmap_item::roadmap_item.phase_program.build_closure.phase_100", "label": "roadmap_item.phase_program.build_closure.phase_100", "type": "roadmap_item", "area": "roadmap", "preview": "", "source": "authority_projection", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "workflow_build_intent::intent:wf_7bb0af90fc76:def_64af40aa30aa5136", "label": "intent:wf_7bb0af90fc76:def_64af40aa30aa5136", "type": "workflow_build_intent", "area": "", "preview": "", "source": "authority_projection", "color": "#4a5068", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_subscribe_events", "label": "Subscribe Events", "type": "tool", "area": "outbox", "preview": "Pull build state events since the agent's last cursor position. Returns new events and advances the cursor. Call repeatedly to stay in sync with platform state changes.\n\nUSE WHEN: you want to see what changed since your last check \u2014 mutations, compilations, commits.\n\nEXAMPLE: praxis_subscribe_events(channel='build_state')", "source": "mcp::::session", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_session_context", "label": "Session Context", "type": "tool", "area": "cli", "preview": "Read or write persistent context on your agent session. Context survives across tool calls and is available on retry.\n\nUSE WHEN: you need to checkpoint state, store intermediate results, or resume from where you left off.\n\nEXAMPLES:\n  Read:  praxis_session_context(action='read')\n  Write: praxis_session_context(action='write', context={'step': 3, 'findings': [...]})", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_artifacts", "label": "Artifacts", "type": "tool", "area": "receipts", "preview": "Browse and compare files produced by workflow sandbox runs. Each workflow job can write artifacts (code, logs, reports) \u2014 this tool lets you find, search, and diff them.\n\nUSE WHEN: you want to see what a workflow job produced, search for specific output, or compare two versions of an artifact.\n\nEXAMPLES:\n  Overall stats:     praxis_artifacts(action='stats')\n  List latest run:   praxis_artifacts(action='list')\n  List by sandbox:   praxis_artifacts(action='list', sandbox_id='sandbox_abc123')\n  Search outputs:    praxis_artifacts(action='search', query='migration schema')\n  Compare versions:  praxis_artifacts(action='diff', artifact_id_a='art_1', artifact_id_b='art_2')", "source": "mcp::::stable", "color": "#73daca", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_bugs", "label": "Bugs", "type": "tool", "area": "bugs", "preview": "Track bugs in the platform's Postgres-backed bug tracker. List open bugs, file new ones, search by keyword, inspect similar historical fixes, replay a bug from canonical evidence, bulk backfill replay provenance, or resolve existing bugs.\n\nSearch uses Postgres full-text ranking and may blend in vector similarity when the embedding lane is available.\n\nUSE WHEN: something is broken and needs tracking, or you want to see known issues.\n\nEXAMPLES:\n  List open bugs:    praxis_bugs(action='list', status='OPEN')\n  File a new bug:    praxis_bugs(action='file', title='TaskAssembler fails on empty manifests', severity='P1', description='...')\n  Search for a bug:  praxis_bugs(action='search', title='routing')\n  Search open bugs:  praxis_bugs(action='search', title='timeout', status='OPEN')\n  Packet for a bug:  praxis_bugs(action='packet', bug_id='BUG-1234')\n  History for bug:   praxis_bugs(action='history', bug_id='BUG-1234')\n  Replay a bug:      praxis_bugs(action='replay', bug_id='BUG-1234')\n  Backfill replay:   praxis_bugs(action='backfill_replay')\n  Attach evidence:   praxis_bugs(action='attach_evidence', bug_id='BUG-1234', evidence_kind='receipt', evidence_ref='receipt:abc')\n  Patch handoff:     praxis_bugs(action='patch_resume', bug_id='BUG-1234', resume_patch={'hypothesis': '...', 'next_steps': ['...']})\n  Bug stats:         praxis_bugs(action='stats')\n  Resolve a bug:     praxis_bugs(action='resolve', bug_id='BUG-1234', status='WONT_FIX')\n  Resolve FIXED:     praxis_bugs(action='resolve', bug_id='BUG-1234', status='FIXED', verifier_ref='verifier.job.python.pytest_file', inputs={'path': 'tests/unit/test_bug.py'})\n\nSTATUSES: OPEN, IN_PROGRESS, FIXED, WONT_FIX, DEFERRED\nSEVERITIES: P0 (critical), P1 (high), P2 (medium), P3 (low)", "source": "mcp::::stable", "color": "#db4b4b", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_connector", "label": "Connector", "type": "tool", "area": "integrations", "preview": "Build API connectors for third-party applications. One call stamps a workflow spec and launches a 4-job pipeline (discover API \u2192 map objects \u2192 build client \u2192 review).\n\nUSE WHEN: you want to create a Python API connector for a third-party service, check on existing connectors, read generated code, or register a built connector so it's callable from workflow jobs and webhook triggers.\n\nEXAMPLES:\n  Build a connector:  praxis_connector(action='build', app_name='Slack')\n  List connectors:    praxis_connector(action='list')\n  Read generated code: praxis_connector(action='get', app_slug='slack')\n  Register for use:   praxis_connector(action='register', app_slug='slack')\n  Verify capabilities: praxis_connector(action='verify', app_slug='slack')\n\nOUTPUT: Code lands in artifacts/connectors/<slug>/ (client.py, models.py, __init__.py).\nResearch and review outputs flow through the service bus, not files.\n\nAfter build completes, use action='register' to make the connector callable from workflow jobs via integration_id/integration_action and from webhook triggers.\n\nDO NOT USE: for general research (use praxis_research), or for managing existing integrations.", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_data", "label": "Data", "type": "tool", "area": "authority", "preview": "Run deterministic data cleanup and reconciliation jobs: parse datasets, profile fields, filter records, sort rows, normalize values, repair rows, run repair loops, backfill missing values, redact sensitive fields, checkpoint state, replay cursor windows, approve plans, apply approved plans, validate contracts, transform records, join or merge sources, aggregate groups, split partitions, export shaped datasets, dedupe keys, route dead-letter rows, reconcile source vs target state, sync target state deterministically, generate workflow specs, and launch those jobs through Praxis.\n\nUSE WHEN: the platform should own exact parsing, mapping, validation, or diff logic instead of asking an LLM to mutate rows heuristically.\n\nEXAMPLES:\n  Profile a file:    praxis_data(action='profile', input_path='artifacts/data/users.csv')\n  Filter rows:       praxis_data(action='filter', input_path='artifacts/data/users.csv', predicates=[{'field':'status','op':'equals','value':'active'}])\n  Join sources:      praxis_data(action='join', input_path='users.json', secondary_input_path='orders.json', keys=['user_id'], right_prefix='order_')\n  Aggregate rows:    praxis_data(action='aggregate', input_path='orders.json', group_by=['status'], aggregations=[{'op':'count','as':'row_count'}])\n  Normalize data:    praxis_data(action='normalize', input_path='artifacts/data/users.csv', rules={'email':['trim','lower']})\n  Repair rows:       praxis_data(action='repair', input_path='users.json', predicates=[{'field':'status','op':'equals','value':'pending'}], repairs={'status': {'value':'active'}})\n  Repair loop:       praxis_data(action='repair_loop', input_path='users.json', repairs={'status': {'value':'active'}}, schema={'email': {'required': true, 'regex': '.+@.+'}})\n  Backfill values:   praxis_data(action='backfill', input_path='users.json', backfill={'country': {'value':'US'}})\n  Redact PII:        praxis_data(action='redact', input_path='users.json', redactions={'email':'mask_email','ssn':'remove'})\n  Checkpoint state:  praxis_data(action='checkpoint', input_path='events.json', keys=['id'], cursor_field='updated_at')\n  Replay window:     praxis_data(action='replay', input_path='events.json', cursor_field='updated_at', checkpoint_manifest_id='checkpoint_xyz789')\n  Approve plan:      praxis_data(action='approve', plan_manifest_id='plan_abc123', approved_by='ops', approval_reason='Reviewed diff and counts')\n  Apply plan:        praxis_data(action='apply', plan_manifest_id='plan_abc123', approval_manifest_id='approval_def456', secondary_input_path='target.json', keys=['id'])\n  Validate rows:     praxis_data(action='validate', input_path='artifacts/data/users.json', schema={'email': {'required': true, 'regex': '.+@.+'}})\n  Merge sources:     praxis_data(action='merge', input_path='crm.json', secondary_input_path='billing.json', keys=['id'], precedence='right')\n  Split rows:        praxis_data(action='split', input_path='users.json', split_by_field='status', output_path='artifacts/data/users_by_status')\n  Export fields:     praxis_data(action='export', input_path='users.json', fields=['id','email'], field_map={'email':'user_email'})\n  Route dead-letter: praxis_data(action='dead_letter', input_path='users.json', schema={'email': {'required': true, 'regex': '.+@.+'}}, output_path='artifacts/data/users_dead_letter')\n  Reconcile state:   praxis_data(action='reconcile', input_path='source.json', secondary_input_path='target.json', keys=['id'])\n  Sync target:       praxis_data(action='sync', input_path='source.json', secondary_input_path='target.json', keys=['id'], sync_mode='mirror')\n  Build workflow:    praxis_data(action='workflow_spec', job={'operation':'normalize', 'input_path':'source.csv', 'rules': {'email':['trim','lower']}})\n  Launch workflow:   praxis_data(action='launch', job={'operation':'dedupe', 'input_path':'source.csv', 'keys':['email']})\n\nDO NOT USE: for fuzzy classification or natural-language inference. This tool is deterministic.", "source": "mcp::::stable", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_dataset", "label": "Dataset", "type": "tool", "area": "authority", "preview": "Praxis dataset refinery: turn evidence-linked execution receipts into curated, lineage-preserving training and eval data for specialist SLMs (slm/review first).\n\nUSE WHEN: you want to see what high-quality evidence Praxis is producing per route, promote a receipt into an SFT example, build an eval case for a held-out revision, or export a JSONL training file with a content-hashed manifest.\n\nEXAMPLES:\n  Summary:           praxis_dataset(action='summary')\n  List candidates:   praxis_dataset(action='candidates_list', candidate_kind='review', eligibility='sft_eligible')\n  Inspect lineage:   praxis_dataset(action='candidate_inspect', candidate_id='...')\n  Scan new receipts: praxis_dataset(action='candidates_scan', limit=200)\n  Record policy:     praxis_dataset(action='policy_record', policy_slug='review.v1', specialist_target='slm/review', rubric={...}, decided_by='nathan', rationale='initial')\n  Promote SFT:       praxis_dataset(action='candidate_promote', candidate_ids=['c_...'], specialist_target='slm/review', policy_id='pol_...', payload={'prompt':{...}, 'target_output':{...}}, promoted_by='nathan', rationale='verifier+reviewer agree', decision_ref='od_...', split_tag='train')\n  Add eval case:     praxis_dataset(action='eval_add', candidate_ids=['c_...'], specialist_target='slm/review', policy_id='pol_...', payload={'case_input':{...}, 'revision_scope':{...}}, promoted_by='nathan', rationale='held-out gold', decision_ref='od_...')\n  Export JSONL:      praxis_dataset(action='export', dataset_family='sft', specialist_target='slm/review', split_tag='train', output_path='artifacts/dataset/review_sft_train.jsonl', exported_by='nathan')\n  Reconcile stale:   praxis_dataset(action='stale_reconcile')\n\nDO NOT USE: as a general-purpose SQL tool \u2014 go through the structured actions so writes stay through operator_write.py and emit the right events.", "source": "mcp::::stable", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_diagnose", "label": "Diagnose", "type": "tool", "area": "bugs", "preview": "Diagnose one workflow run by id. Combines the receipt, failure classification, and provider health into a single operator-facing report.\n\nUSE WHEN: you have a specific run_id and want to know why it failed or what its current health context looks like.\n\nEXAMPLE: praxis_diagnose(run_id='run_abc123')\n\nDO NOT USE: for general health checks (use praxis_health) or broad receipt search (use praxis_receipts).", "source": "mcp::::stable", "color": "#db4b4b", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_discover", "label": "Discover", "type": "tool", "area": "discover", "preview": "Find existing code that already does what you need \u2014 BEFORE writing new code. Uses hybrid retrieval: vector embeddings over AST-extracted behavioral fingerprints plus Postgres full-text search, fused with reciprocal rank fusion so you get both semantic and exact-ish matches even when naming differs.\n\nSEARCH BEFORE YOU BUILD: Before implementing ANY new function, module, class, utility, or pattern, call this tool first. The codebase is large and has extensive existing infrastructure \u2014 duplicating what already exists wastes time and creates maintenance burden. Describe the *behavior* you need, not the name you'd give it. Also use praxis_recall for architectural decisions and praxis_query for DB-level searches (receipts, bugs, constraints). After code changes, call praxis_discover(action='reindex') to update the index.\n\nUSE WHEN: you're about to build something and want to check if it already exists, or you need to find code that handles a specific concern.\n\nEXAMPLES:\n  praxis_discover(query='retry logic with exponential backoff')\n  praxis_discover(query='rate limit backoff', kind='function')\n  praxis_discover(query='Postgres connection pooling')\n  praxis_discover(query='JSON-RPC transport', kind='class')\n  praxis_discover(query='import-linter contract loader', kind='module')\n  praxis_discover(action='reindex')  # after making code changes\n  praxis_discover(action='stats')    # how many items are indexed\n\nDO NOT USE: for searching knowledge/decisions/bugs (use praxis_recall), or for full-text search over workflow results (use praxis_receipts).", "source": "mcp::::stable", "color": "#41a6b5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_receipts", "label": "Receipts", "type": "tool", "area": "receipts", "preview": "Search through past workflow results and analyze costs. Every workflow run produces receipts \u2014 this tool lets you search them by keyword and analyze token/cost spending.\n\nUSE WHEN: you want to find past workflow results, check what an agent produced, or analyze token burn and costs.\n\nEXAMPLES:\n  Find past work:     praxis_receipts(action='search', query='catalog runtime')\n  Failed jobs only:   praxis_receipts(action='search', query='import error', status='failed')\n  By agent:           praxis_receipts(action='search', query='build', agent='openai/gpt-5.4')\n  Cost analytics:     praxis_receipts(action='token_burn', since_hours=24)\n\nDO NOT USE: for live workflow status (use praxis_workflow action='status'), or for knowledge graph search (use praxis_recall).", "source": "mcp::::advanced", "color": "#73daca", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_constraints", "label": "Constraints", "type": "tool", "area": "authority", "preview": "View automatically-mined constraints from past workflow failures. The system learns rules like 'files in runtime/ must include imports' from repeated failures.\n\nUSE WHEN: you want to see what the system has learned from failures, or check if specific files have known constraints before dispatching work that touches them.\n\nEXAMPLES:\n  List all constraints:  praxis_constraints(action='list')\n  Check before writing:  praxis_constraints(action='for_scope', write_paths=['runtime/workflow/unified.py'])", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_friction", "label": "Friction", "type": "tool", "area": "bugs", "preview": "View the friction ledger \u2014 a record of every time a guardrail blocked or warned about an action (scope violations, secret leaks, policy bounces).\n\nUSE WHEN: you want to understand what's being blocked by governance, identify recurring friction patterns, or audit guardrail activity.\n\nEXAMPLES:\n  Overview stats:     praxis_friction(action='stats')\n  Recent events:      praxis_friction(action='list', limit=10)\n  From one source:    praxis_friction(action='list', source='governance')", "source": "mcp::::advanced", "color": "#db4b4b", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_governance", "label": "Governance", "type": "tool", "area": "governance", "preview": "Safety checks before dispatching work. Scan prompts for leaked secrets (API keys, tokens, passwords) or verify that a set of file paths falls within allowed scope.\n\nUSE WHEN: you're about to submit a workflow prompt and want to verify it doesn't contain secrets, or you want to check if write paths are within allowed boundaries.\n\nEXAMPLES:\n  Scan for secrets:  praxis_governance(action='scan_prompt', text='Use key sk-abc123...')\n  Check scope:       praxis_governance(action='scan_scope', write_paths=['runtime/workflow.py'], allowed_paths=['runtime/'])", "source": "mcp::::advanced", "color": "#e0dc8f", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_heal", "label": "Heal", "type": "tool", "area": "heal", "preview": "Diagnose why a workflow job failed and get a recommended recovery action: retry (transient error), escalate (needs human attention), skip (non-critical), or halt (stop the pipeline).\n\nUSE WHEN: a workflow job failed and you need to decide what to do next. Pass the job_label plus failure_code from the receipt, stderr from the runner, or both.\n\nEXAMPLE: praxis_heal(job_label='build_api', failure_code='EXEC_TIMEOUT', stderr='Process killed after 120s')\nEXAMPLE: praxis_heal(job_label='build_api', stderr='failure_code must be a non-empty string')\n\nDO NOT USE: for retrying a job (use praxis_workflow action='retry' after getting the recommendation).", "source": "mcp::::advanced", "color": "#9ece6a", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_health", "label": "Health", "type": "tool", "area": "circuits", "preview": "Full system health check \u2014 Postgres connectivity, disk space, operator panel state, workflow lane recommendations, context cache stats, memory graph health, and projection freshness (event-log cursors + process-cache refresh lag).\n\nUSE WHEN: starting a session, things seem broken, or you want to verify the platform is ready before dispatching work. No parameters needed.\n\nEXAMPLE: praxis_health()\n\nDO NOT USE: for workflow pass/fail rates (use praxis_status_snapshot), or for operator-level detail (use explicit tools like praxis_run_status or praxis_graph_projection).", "source": "mcp::::stable", "color": "#f7768e", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_reload", "label": "Reload", "type": "tool", "area": "circuits", "preview": "Clear all in-process caches so DB and config changes take effect without restarting Claude Desktop.\n\nUSE WHEN: you just applied a migration, updated native runtime authority, added a model to provider_model_candidates, or changed anything in Postgres that the MCP server caches on first load.\n\nEXAMPLE: praxis_reload()\n\nClears: model_profiles context windows, MCP tool catalog, context cache.", "source": "mcp::::advanced", "color": "#f7768e", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_integration", "label": "Integration", "type": "tool", "area": "integrations", "preview": "Call, list, or describe registered integrations (API connectors, webhooks, and other external services).\n\nUSE WHEN: you need to call an external API, send a webhook, list available integrations, or check what actions a connector supports.\n\nEXAMPLES:\n  List available:     praxis_integration(action='list')\n  Describe one:       praxis_integration(action='describe', integration_id='stripe')\n  Call an action:     praxis_integration(action='call', integration_id='stripe', integration_action='list_payments', args={'limit': 10})\n\nIntegrations are registered via praxis_connector (build + register) or TOML manifests. Use action='list' to discover what's available before calling.\n\nDO NOT USE: for workflow dispatch (use praxis_workflow), or for building new connectors (use praxis_connector).", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_intent_match", "label": "Intent Match", "type": "tool", "area": "discover", "preview": "Find existing UI components, workflows, and integrations that match what you want to build. Searches the registry and proposes how to compose them into an app.\n\nUSE WHEN: the user describes what they want to build and you need to check what building blocks already exist. This is the first step before praxis_manifest_generate.\n\nEXAMPLE: praxis_intent_match(intent='invoice processing workflow with approval steps')\n\nDO NOT USE: for code-level search (use praxis_discover), or for knowledge lookup (use praxis_recall).", "source": "mcp::::stable", "color": "#41a6b5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_manifest_generate", "label": "Manifest Generate", "type": "tool", "area": "build", "preview": "Generate a complete app manifest (UI layout, data flow, integrations) from a natural language description. Combines intent matching with LLM generation to produce a ready-to-render manifest.\n\nUSE WHEN: the user wants to create a new app, dashboard, or workflow from a description.\n\nEXAMPLE: praxis_manifest_generate(intent='customer onboarding pipeline with status tracking')\n\nFOLLOW-UP: use praxis_manifest_refine to iterate on the generated manifest.", "source": "mcp::::advanced", "color": "#b4f9f8", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_manifest_refine", "label": "Manifest Refine", "type": "tool", "area": "build", "preview": "Iterate on a previously generated app manifest. Apply user feedback to adjust layout, add/remove modules, change data sources, or modify behavior.\n\nUSE WHEN: the user wants to change something about a manifest generated by praxis_manifest_generate.\n\nEXAMPLE: praxis_manifest_refine(manifest_id='manifest_abc123', feedback='Add a chart showing weekly trends and remove the status grid')", "source": "mcp::::advanced", "color": "#b4f9f8", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_recall", "label": "Recall", "type": "tool", "area": "memory", "preview": "Search the platform's knowledge graph for information about modules, functions, decisions, patterns, bugs, constraints, people, or any previously ingested content. Returns ranked results with confidence scores and how each result was found (text match, graph traversal, or vector similarity).\n\nUSE WHEN: you need to look up what a module does, find related decisions, understand connections between components, or recall previously stored knowledge.\n\nEXAMPLES:\n  praxis_recall(query='how does job dependency resolution work')\n  praxis_recall(query='provider routing', entity_type='decision')\n  praxis_recall(query='dispatch run completion trigger retirement')\n  praxis_recall(query='workflow_runs', entity_type='table')\n  praxis_recall(query='retry policy', entity_type='pattern')\n\nDO NOT USE: for searching code by similarity (use praxis_discover), for searching workflow receipts (use praxis_receipts), for exact architecture drift checks (`workflow architecture scan`), or for general questions (use praxis_query).", "source": "mcp::::stable", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_ingest", "label": "Ingest", "type": "tool", "area": "memory", "preview": "Store new information in the knowledge graph so it can be recalled later via praxis_recall. Content is automatically entity-extracted, deduplicated, and embedded for vector search.\n\nUSE WHEN: you have analysis results, documentation, conversation summaries, or structured knowledge to persist for future sessions.\n\nEXAMPLES:\n  praxis_ingest(kind='document', content='# API Catalog\\n...', source='catalog/api')\n  praxis_ingest(kind='build_event', content='Build failed: missing import in X', source='ci/build_42')\n  praxis_ingest(kind='conversation', content='User decided to use Postgres for all state', source='session/2026-04-07')\n\nKINDS: 'document' (reference docs, catalogs), 'build_event' (CI/build results), 'extraction' (structured data from code analysis), 'conversation' (session decisions), 'meeting_transcript' (speaker turns / transcript action items), 'import' (bulk data import).", "source": "mcp::::advanced", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_graph", "label": "Graph", "type": "tool", "area": "memory", "preview": "Explore connections from one knowledge-graph entity. Shows what an entity depends on, what depends on it, and the blast radius of changes.\n\nUSE WHEN: you already know the target entity_id from praxis_recall, or you want a quick look at the latest available entity without hunting for an id first.\n\nEXAMPLES:\n  praxis_graph(depth=1)\n  praxis_graph(entity_id='module:task_assembler', depth=2)\n\nDO NOT USE: for broad knowledge search or discovery; use praxis_recall first when you need ranked candidates.", "source": "mcp::::advanced", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_status_snapshot", "label": "Status Snapshot", "type": "tool", "area": "outbox", "preview": "Read the canonical workflow status snapshot \u2014 pass rate, failure mix, queue depth, and in-flight run summaries from receipt authority.", "source": "mcp::::advanced", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_metrics_reset", "label": "Metrics Reset", "type": "tool", "area": "circuits", "preview": "Reset observability metrics through explicit operator maintenance authority.", "source": "mcp::::advanced", "color": "#f7768e", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_bug_replay_provenance_backfill", "label": "Bug Replay Provenance Backfill", "type": "tool", "area": "bugs", "preview": "Backfill replay provenance from canonical bug and receipt authority.", "source": "mcp::::advanced", "color": "#db4b4b", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_semantic_bridges_backfill", "label": "Semantic Bridges Backfill", "type": "tool", "area": "authority", "preview": "Replay semantic bridges from canonical operator authority into semantic assertions.", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_semantic_projection_refresh", "label": "Semantic Projection Refresh", "type": "tool", "area": "authority", "preview": "Refresh the semantic projection through explicit operator maintenance authority.", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_run_status", "label": "Run Status", "type": "tool", "area": "outbox", "preview": "Read one run-scoped operator status view.", "source": "mcp::::advanced", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_run_scoreboard", "label": "Run Scoreboard", "type": "tool", "area": "outbox", "preview": "Read one run-scoped cutover scoreboard.", "source": "mcp::::advanced", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_run_graph", "label": "Run Graph", "type": "tool", "area": "outbox", "preview": "Read one run-scoped workflow graph.", "source": "mcp::::advanced", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_graph_projection", "label": "Graph Projection", "type": "tool", "area": "memory", "preview": "Read the cross-domain operator graph projection.", "source": "mcp::::advanced", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_run_lineage", "label": "Run Lineage", "type": "tool", "area": "outbox", "preview": "Read one run-scoped lineage view.", "source": "mcp::::advanced", "color": "#2ac3de", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_issue_backlog", "label": "Issue Backlog", "type": "tool", "area": "authority", "preview": "Read the canonical operator issue backlog.", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_replay_ready_bugs", "label": "Replay Ready Bugs", "type": "tool", "area": "bugs", "preview": "Read the replay-ready bug backlog from authoritative provenance.", "source": "mcp::::advanced", "color": "#db4b4b", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_write", "label": "Operator Write", "type": "tool", "area": "roadmap", "preview": "Preview, validate, or commit roadmap rows through the shared operator-write validation gate.\n\nUSE WHEN: you want to add a roadmap item or a packaged roadmap program without raw SQL. This gate auto-generates ids, keys, dependency ids, and phase ordering, then returns a preview before commit.\n\nEXAMPLE: praxis_operator_write(action='preview', title='Unified operator write gate', intent_brief='Single preview-first validation gate for roadmap writes', parent_roadmap_item_id='roadmap_item.authority.cleanup', template='hard_cutover_program')", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_decisions", "label": "Operator Decisions", "type": "tool", "area": "authority", "preview": "List or record canonical operator decisions through the shared operator_decisions table.\n\nUSE WHEN: you need durable, queryable operator decisions such as architecture policy rows, and you want them stored as first-class control authority instead of hidden in prose.\n\nEXAMPLE: praxis_operator_decisions(action='list', decision_kind='architecture_policy')", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_relations", "label": "Operator Relations", "type": "tool", "area": "authority", "preview": "Record canonical functional areas and cross-object semantic relations.\n\nUSE WHEN: a bug, roadmap item, repo path, document, workflow target, or decision needs one explicit semantic edge instead of hidden tags or prose.\n\nACTIONS:\n  'record_functional_area' \u2014 create or update one functional area row\n  'record_relation' \u2014 create or update one cross-object relation row\n\nEXAMPLES:\n  praxis_operator_relations(action='record_functional_area', area_slug='checkout', title='Checkout', summary='Shared checkout semantics')\n  praxis_operator_relations(action='record_relation', relation_kind='grouped_in', source_kind='roadmap_item', source_ref='roadmap_item.checkout', target_kind='functional_area', target_ref='checkout')", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_semantic_assertions", "label": "Semantic Assertions", "type": "tool", "area": "authority", "preview": "Register semantic predicates, record or retract semantic assertions, and query the canonical semantic substrate.\n\nUSE WHEN: semantics should become typed authority rows with explicit provenance and validity instead of hidden metadata fields or prose.\n\nACTIONS:\n  'list' \u2014 query semantic assertions through the CQRS read path\n  'register_predicate' \u2014 register or update one predicate vocabulary row\n  'record_assertion' \u2014 record one semantic assertion row and emit a semantic bus event\n  'retract_assertion' \u2014 retract one semantic assertion row and emit a semantic bus event\n\nEXAMPLES:\n  praxis_semantic_assertions(action='register_predicate', predicate_slug='grouped_in', subject_kind_allowlist=['bug'], object_kind_allowlist=['functional_area'])\n  praxis_semantic_assertions(action='record_assertion', predicate_slug='grouped_in', subject_kind='bug', subject_ref='bug.checkout.1', object_kind='functional_area', object_ref='functional_area.checkout', source_kind='operator', source_ref='nate')", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_native_primary_cutover_gate", "label": "Operator Native Primary Cutover Gate", "type": "tool", "area": "authority", "preview": "Admit a native primary cutover gate into operator-control decision and gate authority tables.\n\nUSE WHEN: you need a tracked cutover decision for one target (roadmap item, workflow class, or schedule definition) with optional policy/evidence payloads.\n\nEXAMPLE: praxis_operator_native_primary_cutover_gate(\n  decided_by='operator-auto',\n  decision_source='runbook',\n  rationale='manual rollout hold ended',\n  roadmap_item_id='roadmap_item.platform.deploy',\n  gate_policy={'rollout_window':'canary'},\n  required_evidence={'checks':['operator-readiness']}\n)", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_architecture_policy", "label": "Operator Architecture Policy", "type": "tool", "area": "authority", "preview": "Record a durable architecture-policy decision in operator authority.\n\nUSE WHEN: explicit operator or CTO guidance should become a typed, queryable decision row instead of living only in chat, docs, or migration folklore.\n\nEXAMPLE: praxis_operator_architecture_policy(\n  authority_domain='decision_tables',\n  policy_slug='db-native-authority',\n  title='Decision tables are DB-native authority',\n  decided_by='nate',\n  decision_source='cto.guidance',\n  rationale='Authority, durable state, and orchestration belong in DB primitives.'\n)", "source": "mcp::::advanced", "color": "#a9b1d6", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_closeout", "label": "Operator Closeout", "type": "tool", "area": "roadmap", "preview": "Preview or commit proof-backed bug and roadmap closeout through the shared reconciliation gate.\n\nUSE WHEN: you want to safely close bugs and linked roadmap items from explicit validates_fix evidence without mutating truth from inference alone. Preview returns candidates and skips; commit applies only the proof-backed subset.\n\nEXAMPLE: praxis_operator_closeout(action='preview', bug_ids=['bug.operator.fix.123'])", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_operator_roadmap_view", "label": "Operator Roadmap View", "type": "tool", "area": "roadmap", "preview": "Read one roadmap subtree and its dependency edges from DB-backed authority.\n\nUSE WHEN: you want the full package view for a roadmap item, including generated child waves, external dependency edges, canonical semantic neighbors, and a rendered markdown outline.\n\nEXAMPLES:\n  praxis_operator_roadmap_view()\n  praxis_operator_roadmap_view(root_roadmap_item_id='roadmap_item.authority.cleanup.unified.operator.write.validation.gate')\n  praxis_operator_roadmap_view(root_roadmap_item_id='roadmap_item.authority.cleanup.unified.operator.write.validation.gate', semantic_neighbor_limit=8)", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_circuits", "label": "Circuits", "type": "tool", "area": "circuits", "preview": "Inspect effective circuit-breaker state or apply a durable manual override for one provider.\n\nACTIONS:\n  'list'  \u2014 show effective state, runtime state, and any active manual override metadata\n  'history' \u2014 show append-only override decision history from operator authority\n  'open'  \u2014 force the breaker open for one provider until reset or effective_to\n  'close' \u2014 force the breaker closed for one provider until reset or effective_to\n  'reset' \u2014 clear the manual override and return to runtime-managed breaker behavior\n\nUSE WHEN: you need operator control over provider traffic without mutating in-memory state by hand.", "source": "mcp::::stable", "color": "#f7768e", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_provider_onboard", "label": "Provider Onboard", "type": "tool", "area": "integrations", "preview": "Onboard a CLI or API provider into Praxis Engine through one catalog-backed operation. Probes transport, discovers models, writes onboarding authority, and performs the canonical post-onboarding sync.\n\nUSE WHEN: connecting a new provider or adding models to an existing provider.\n\nEXAMPLES:\n  Probe first:  praxis_provider_onboard(action='probe', provider_slug='anthropic', transport='cli')\n  Then onboard: praxis_provider_onboard(action='onboard', provider_slug='anthropic', transport='cli')\n  API provider: praxis_provider_onboard(action='onboard', provider_slug='openrouter', transport='api', api_key_env_var='OPENROUTER_API_KEY')\n\nThe 'probe' action is a dry run. The 'onboard' action writes onboarding authority and applies the canonical post-onboarding sync.\n\nDO NOT USE: for checking provider health (use praxis_health).", "source": "mcp::::advanced", "color": "#ff9e64", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_query", "label": "Query", "type": "tool", "area": "discover", "preview": "Ask any question about the system in plain English. This is the best starting point when you're unsure which tool to use \u2014 it automatically routes your question to the right subsystem. Think of it as a router, not as the deep authority for every domain.\n\nUSE WHEN: the user asks a question and you're not sure which specific tool handles it.\n\nEXAMPLES:\n  'what is the current pass rate?'         \u2192 workflow status\n  'what is failing right now?'             \u2192 recent failure evidence\n  'are there any open bugs?'               \u2192 bug tracker\n  'which agent performs best?'             \u2192 leaderboard\n  'what failed recently?'                  \u2192 failure analysis\n  'how much did we spend on tokens today?' \u2192 receipt analytics\n  'what does TaskAssembler do?'            \u2192 knowledge graph search\n  'find retry logic with exponential backoff' \u2192 code discovery\n  'data dictionary'                        \u2192 browsable table schema + valid values\n  'schema for workflow_runs'               \u2192 detailed table schema\n  'import path for SchemaProjector'        \u2192 exact import statement\n  'test command for runtime/compiler.py'   \u2192 pytest command + test files\n\nROUTES TO: status, bugs, quality metrics, failure analysis, agent leaderboard, code discovery, receipt search, constraints, friction, artifacts, heartbeat, governance, health, data dictionary, import resolver, test commands, or knowledge graph (fallback).\n\nDO NOT USE: when you already know which specific tool to call, or when you need an exact static architecture scan (`workflow architecture scan`).", "source": "mcp::::stable", "color": "#41a6b5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_research_workflow", "label": "Research Workflow", "type": "tool", "area": "memory", "preview": "Run a parallel multi-angle research workflow on any topic. One call generates a workflow spec (seed decomposition, N parallel research workers via replicate, synthesis) and launches it through the service bus.\n\nUSE WHEN: you want deep, cited research on a topic from multiple angles. The workflow fans out parallel workers (default 40 DeepSeek via OpenRouter) and synthesizes their findings.\n\nEXAMPLES:\n  Run research:  praxis_research_workflow(action='run', topic='AI agent architecture patterns')\n  Custom count:  praxis_research_workflow(action='run', topic='...', workers=20)\n  List past runs: praxis_research_workflow(action='list')\n\nOUTPUT: All results flow through the service bus via praxis_submit_research_result. No files are written to disk. Use praxis_workflow action='status' to poll progress.\n\nDO NOT USE: for knowledge graph search (use praxis_research), or for single-shot research questions (use praxis_query).", "source": "mcp::::advanced", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_context_shard", "label": "Context Shard", "type": "tool", "area": "cli", "preview": "Return the bounded execution shard for the current workflow MCP session. This is only valid inside workflow Docker jobs using the signed MCP bridge.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_heartbeat", "label": "Heartbeat", "type": "tool", "area": "memory", "preview": "Run or check the knowledge graph maintenance cycle. The heartbeat syncs receipts, bugs, constraints, and friction events into the knowledge graph, mines relationships between entities, generates daily/weekly rollups, and archives stale nodes.\n\nUSE WHEN: the knowledge graph seems stale, or you want to trigger a maintenance cycle after a batch of dispatches.\n\nEXAMPLES:\n  Run maintenance:  praxis_heartbeat(action='run')\n  Check last run:   praxis_heartbeat(action='status')", "source": "mcp::::advanced", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_session", "label": "Session", "type": "tool", "area": "cli", "preview": "View or validate session carry-forward packs \u2014 compressed context snapshots that help new sessions pick up where previous ones left off.\n\nUSE WHEN: starting a new session and want to load prior context, or verifying that a session pack is intact.\n\nEXAMPLES:\n  Get latest pack:   praxis_session(action='latest')\n  Validate a pack:   praxis_session(action='validate', pack_id='pack_abc123')", "source": "mcp::::advanced", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_research", "label": "Research", "type": "tool", "area": "memory", "preview": "Search the knowledge graph specifically for research findings and analysis results. Lighter-weight than praxis_recall \u2014 focused on retrieving prior research.\n\nUSE WHEN: you want to check if someone already researched a topic.\n\nEXAMPLE: praxis_research(action='search', query='provider routing performance')\n\nDO NOT USE: for general knowledge search (use praxis_recall), or for code search (use praxis_discover).", "source": "mcp::::stable", "color": "#c0caf5", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_decompose", "label": "Decompose", "type": "tool", "area": "compiler", "preview": "Break down a large objective into small, workflow-ready micro-sprints. Returns each sprint with estimated complexity, dependencies between sprints, and the critical path.\n\nUSE WHEN: you have a big task and need to plan how to break it into workflow jobs.\n\nEXAMPLES:\n  praxis_decompose(objective='Add real-time notifications to the workflow runtime')\n  praxis_decompose(objective='Consolidate operator surfaces', scope_files=['surfaces/api/operator_read.py', 'surfaces/api/operator_write.py'])\n\nDO NOT USE: for running the work (use praxis_workflow after decomposing).", "source": "mcp::::stable", "color": "#7aa2f7", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_submit_code_change", "label": "Submit Code Change", "type": "tool", "area": "cli", "preview": "Submit a sealed code-change result for the current workflow MCP session. The session token owns run_id, workflow_id, and job_label. This tool never accepts those ids as input and returns structured errors instead of stack traces.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_submit_research_result", "label": "Submit Research Result", "type": "tool", "area": "cli", "preview": "Submit a sealed research result for the current workflow MCP session. The session token owns run_id, workflow_id, and job_label. This tool never accepts those ids as input and returns structured errors instead of stack traces.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_submit_artifact_bundle", "label": "Submit Artifact Bundle", "type": "tool", "area": "cli", "preview": "Submit a sealed artifact bundle result for the current workflow MCP session. The session token owns run_id, workflow_id, and job_label. This tool never accepts those ids as input and returns structured errors instead of stack traces.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_get_submission", "label": "Get Submission", "type": "tool", "area": "cli", "preview": "Read a sealed workflow submission within the current workflow MCP session. The session token owns run_id/workflow_id and the tool only accepts submission_id or job_label for the target submission.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_review_submission", "label": "Review Submission", "type": "tool", "area": "cli", "preview": "Review a sealed workflow submission within the current workflow MCP session. The session token owns run_id/workflow_id/job_label for the reviewer. The tool only accepts submission_id or job_label for the target submission.", "source": "mcp::::session", "color": "#cfc9c2", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_wave", "label": "Wave", "type": "tool", "area": "compiler", "preview": "Manage execution waves \u2014 groups of jobs with dependency ordering. Waves track which jobs are runnable (all dependencies met) and which are blocked.\n\nUSE WHEN: you're orchestrating multi-phase work where later jobs depend on earlier ones completing successfully.\n\nWORKFLOW:\n  1. praxis_wave(action='observe')                    \u2014 see current wave state\n  2. praxis_wave(action='start', wave_id='wave_1')    \u2014 begin a new wave\n  3. praxis_wave(action='next')                       \u2014 get jobs ready on the current/only wave\n  4. praxis_wave(action='record', jobs='build:pass,test:fail')  \u2014 record results on the current/only wave\n\nDO NOT USE: for simple flat workflow launches (use praxis_workflow). Waves are for complex multi-step pipelines with explicit dependency tracking.", "source": "mcp::::advanced", "color": "#7aa2f7", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_workflow", "label": "Workflow", "type": "tool", "area": "compiler", "preview": "Execute work by launching a workflow for LLM agents. This is the primary way to run tasks \u2014 building code, running tests, writing reviews, refactoring, and debates.\n\nUSE WHEN: you need to run a workflow spec, spawn a child workflow, check on a running workflow, retry a failed job, cancel a run, or repair a degraded post-run sync state.\n\nWORKFLOW CONTRACT:\n  - action='run' is the kickoff call. Treat run_id as the authority and follow with status or stream reads on separate channels.\n  - action='preview' assembles the exact worker-facing execution payload without creating a workflow run.\n  - Kickoff and status payloads now always include dashboard.\n  - Direct callers without an MCP emitter receive kickoff-only payloads immediately.\n  - MCP callers with wait=true only keep the call open for inline polling when they send _meta.progressToken. In that mode they receive dashboard panels on notifications/message and progress counters on notifications/progress.\n  - Without _meta.progressToken, the kickoff payload returns immediately and the payload delivery metadata makes that explicit instead of hiding it.\n  - Use wait=false to force kickoff-only behavior even when a progress emitter exists.\n  - Use action='status' for a snapshot of a running or completed workflow, including dashboard.\n  - Use action='claim' to inspect claimable worker work for a subscription/run pair.\n  - Use action='acknowledge' to commit a checkpoint for a previously claimed worker batch.\n  - Read health.likely_failed, health.signals to detect stuck runs.\n  - Use kill_if_idle=true on a status call if the run is clearly idle and unhealthy.\n\nEXAMPLES:\n  Launch:          praxis_workflow(action='run', spec_path='artifacts/workflow/my_spec.queue.json')\n  Preview inputs:  praxis_workflow(action='preview', spec_path='artifacts/workflow/my_spec.queue.json')\n  Spawn child:     praxis_workflow(action='spawn', spec_path='...', parent_run_id='workflow_parent', dispatch_reason='phase.spawn')\n  Force kickoff:   praxis_workflow(action='run', spec_path='...', wait=false)\n  Check status:    praxis_workflow(action='status', run_id='workflow_abc123')\n  Retry a failure: praxis_workflow(action='retry', run_id='workflow_abc123', label='build_step')\n  Cancel a run:    praxis_workflow(action='cancel', run_id='workflow_abc123')\n  Repair sync:     praxis_workflow(action='repair', run_id='workflow_abc123')\n  List recent:     praxis_workflow(action='list')\n\nDO NOT USE: for asking questions about the system (use praxis_query), checking health (use praxis_health), or searching past results (use praxis_receipts).", "source": "mcp::::advanced", "color": "#7aa2f7", "degree": 1, "size": 8.2}}, {"data": {"id": "tool::praxis_workflow_validate", "label": "Workflow Validate", "type": "tool", "area": "compiler", function mkRelCheckbox(container, key, count) {
  const rs = RELATION_STYLES[key] || { color: '#7e869e', style: 'solid' };

  label.appendChild(document.createTextNode(key + ' (' + count + ')'));

}

// Progressive disclosure state
const expandedAreas = new Set();

function syncExpandedClass() {
  cy.nodes('[?is_area]').forEach(a => {
    if (expandedAreas.has(a.data('area'))) a.addClass('expanded');
    else a.removeClass('expanded');
  });
}

// Zoom-gated labels (area labels are always shown)
let labelMode = 'auto'; // auto | always | off
function applyLabelMode() {
  const zoom = cy.zoom();
  const show = labelMode === 'always' || (labelMode === 'auto' && zoom > 1.3);
  cy.nodes().not('[?is_area]').not('.hover').style('text-opacity', show ? 1 : 0);
}
cy.on('zoom', applyLabelMode);

document.getElementById('btn-labels').addEventListener('click', () => {
  labelMode = labelMode === 'auto' ? 'always' : labelMode === 'always' ? 'off' : 'auto';
  document.getElementById('btn-labels').textContent = 'Labels: ' + labelMode;
  applyLabelMode();
});
document.getElementById('btn-fit').addEventListener('click', () => {
  const visible = cy.nodes().filter(n => n.style('display') !== 'none');
  cy.fit(visible.length ? visible : cy.nodes('[?is_area]'), 60);

document.getElementById('btn-expand-all').addEventListener('click', () => {
  cy.nodes('[?is_area]').forEach(a => {
    const slug = a.data('area');
    if (!expandedAreas.has(slug)) {

      layoutArea(slug);

document.getElementById('btn-collapse-all').addEventListener('click', () => {

function updateModeHint() {
  const hint = document.getElementById('mode-hint');
  const total = cy.nodes('[?is_area]').length;
  const n = expandedAreas.size;
  if (n === 0) hint.textContent = 'click an area to expand';
  else if (n === total) hint.textContent = 'all ' + total + ' areas expanded';
  else hint.textContent = n + ' / ' + total + ' areas expanded';
}

// Hover neighborhood focus — works for both area (overview) and node (expanded) layers.
cy.on('mouseover', 'node', evt => {
  const n = evt.target;
  const visibleEdges = n.connectedEdges().not('.pull').filter(e => e.style('display') !== 'none');
  const neighbors = visibleEdges.connectedNodes();
  const hood = n.union(neighbors).union(visibleEdges);
  cy.elements().not(hood).not('.pull').addClass('faded');
  hood.removeClass('faded');
  visibleEdges.addClass('highlight');
  n.addClass('hover');
  hood.nodes().style('text-opacity', 1);
});
cy.on('mouseout', 'node', evt => {
  cy.elements().removeClass('faded');
  cy.edges().removeClass('highlight');
  cy.nodes().removeClass('hover');
  applyLabelMode();
});

// Tracks areas that have been laid out at least once so re-expand is instant.
const laidOutAreas = new Set();

function layoutArea(areaSlug) {
  const areaNode = cy.$('#area\\:\\:' + areaSlug.replace(/[^\w-]/g, ''));
  const members = cy.nodes().filter(n => !n.data('is_area') && n.data('area') === areaSlug);
  if (members.length === 0) return;
  const center = areaNode.position();
  // Scale the local layout's bounding box to member count so large areas don't
  // overlap their neighbors. Roughly: radius grows with sqrt(count).
  const radius = Math.max(80, 22 * Math.sqrt(members.length));
  const bb = {
    x1: center.x - radius, y1: center.y - radius,
    x2: center.x + radius, y2: center.y + radius,
  };
  const name = members.length > 30 ? 'grid' : (members.length > 10 ? 'concentric' : 'circle');
  const opts = {
    name, boundingBox: bb, animate: true, animationDuration: 350,
    fit: false, avoidOverlap: true, padding: 10,
  };
  if (name === 'concentric') {
    opts.concentric = n => n.degree(true);
    opts.levelWidth = () => 2;
    opts.minNodeSpacing = 18;
  }
  if (name === 'circle') opts.radius = radius * 0.8;
  members.layout(opts).run();
  laidOutAreas.add(areaSlug);
}

// Click: area → toggle expand; non-area → detail pane
cy.on('tap', 'node', evt => {
  const d = evt.target.data();
  if (d.is_area) {
    if (expandedAreas.has(d.area)) {
      expandedAreas.delete(d.area);
    } else {
      expandedAreas.add(d.area);
      layoutArea(d.area);
    }
    syncExpandedClass();
    applyFilters();
    updateModeHint();
    return;
  }
  renderDetail(d, evt.target);
});
cy.on('tap', evt => {
  if (evt.target === cy) {
    document.getElementById('detail').innerHTML = '<p class="empty">Click an area to expand its members.<br>Click a node to inspect.<br>Hover to focus neighborhood.</p>';
  }
});

function renderDetail(d, node) {
  const box = document.getElementById('detail');
  box.innerHTML = '';
  const h = document.createElement('h2'); h.textContent = d.label; box.appendChild(h);
  const tags = document.createElement('div'); tags.className = 'tags';
  if (d.area) { const t = document.createElement('span'); t.className = 'tag area'; t.textContent = d.area; tags.appendChild(t); }
  const tt = document.createElement('span'); tt.className = 'tag'; tt.textContent = d.type; tags.appendChild(tt);
  box.appendChild(tags);
  const s = document.createElement('div'); s.className = 'src';
  s.textContent = d.id + (d.source ? ' • ' + d.source : '');
  box.appendChild(s);
  if (d.preview) { const p = document.createElement('pre'); p.textContent = d.preview; box.appendChild(p); }
  const neigh = node.neighborhood('node').not('[?is_area]');
  if (neigh.length) {
    const nw = document.createElement('div'); nw.className = 'neighbors';
    const nh = document.createElement('h2'); nh.textContent = 'Connected (' + neigh.length + ')';
    nh.style.fontSize = '10px'; nh.style.letterSpacing = '0.8px'; nh.style.textTransform = 'uppercase';
    nh.style.color = 'var(--text-dim)'; nh.style.margin = '0 0 6px'; nw.appendChild(nh);
    neigh.forEach(nn => {
      const row = document.createElement('div'); row.className = 'nrow';
      const sw = document.createElement('span'); sw.className = 'swatch';
      sw.style.background = nn.data('color');
      row.appendChild(sw);
      row.appendChild(document.createTextNode(nn.data('label')));
      row.addEventListener('click', () => {
        cy.$(':selected').unselect();
        nn.select();
        cy.animate({ center: { eles: nn }, zoom: 1.6 }, { duration: 400 });
        renderDetail(nn.data(), nn);
      });
      nw.appendChild(row);
    });
    box.appendChild(nw);
  }
}

function applyFilters() {
  const activeAreas = new Set([...document.querySelectorAll('#area-filters input:checked')].map(i => i.dataset.area));
  const activeTypes = new Set([...document.querySelectorAll('#type-filters input:checked')].map(i => i.dataset.type));
  const activeRelations = new Set([...document.querySelectorAll('#relation-filters input:checked')].map(i => i.dataset.relation));
  const q = (document.getElementById('search').value || '').toLowerCase().trim();

  cy.nodes().forEach(n => {
    const d = n.data();
    if (d.is_area) {
      n.style('display', activeAreas.has(d.area) ? 'element' : 'none');
      return;
    }
    const areaOk = activeAreas.has(d.area || '(unowned)');
    const typeOk = activeTypes.has(d.type);
    const searchMatch = q && ((d.label || '').toLowerCase().includes(q) || (d.id || '').toLowerCase().includes(q));
    // Overview layer: non-area nodes hidden until their area is expanded
    // (or the user is actively searching for them).
    const expanded = d.area && expandedAreas.has(d.area);
    const visible = areaOk && typeOk && (expanded || searchMatch);
    n.style('display', visible ? 'element' : 'none');
  });

  cy.edges().forEach(e => {
    const d = e.data();
    if (d.is_pull) {
      // Invisible layout-only edges: keep in graph, but styled to 0 opacity.
      e.style('display', 'element');
      return;
    }
    const sVis = e.source().style('display') !== 'none';
    const tVis = e.target().style('display') !== 'none';
    if (!sVis || !tVis) {
      e.style('display', 'none');
      return;
    }
    const relOk = !d.label || activeRelations.has(d.label);
    if (!relOk) { e.style('display', 'none'); return; }
    if (d.is_aggregate) {
      // Hide aggregate when both endpoint areas are fully expanded —
      // the underlying real edges take over and carry the same signal.
      const srcArea = e.source().data('area');
      const tgtArea = e.target().data('area');
      const bothExpanded = expandedAreas.has(srcArea) && expandedAreas.has(tgtArea);
      e.style('display', bothExpanded ? 'none' : 'element');
      return;
    }
    e.style('display', 'element');
  });
}

// Overview layout: fcose on area nodes + aggregate edges only.
// Non-area nodes get stacked at their area's position until expand.
function layoutOverview(animate) {
  const areaEles = cy.nodes('[?is_area]').union(cy.edges('[?is_aggregate]'));
  const layout = areaEles.layout({
    name: 'fcose',
    animate: !!animate,
    animationDuration: animate ? 500 : 0,
    randomize: true,
    nodeRepulsion: 150000,
    idealEdgeLength: 260,
    edgeElasticity: 0.1,
    gravity: 0.05,
    numIter: 3500,
    packComponents: true,
    uniformNodeDimensions: false,
    nodeSeparation: 160,
    fit: false,
  });
  layout.run();
  // Stack members at their area position; layoutArea() spreads on expand.
  cy.nodes('[?is_area]').forEach(a => {
    const p = a.position();
    cy.nodes().filter(n => !n.data('is_area') && n.data('area') === a.data('area'))
      .forEach(m => m.position({ x: p.x, y: p.y }));
  });
  // Un-laid-out status so re-expand re-runs local layout.
  laidOutAreas.clear();
  // Previously-expanded areas need a layout re-run after re-positioning.
  expandedAreas.forEach(slug => layoutArea(slug));
}

cy.ready(() => {
  layoutOverview(false);
  applyFilters();
  syncExpandedClass();
  updateModeHint();
  cy.fit(cy.nodes('[?is_area]'), 80);
  applyLabelMode();
});

// Re-layout button re-runs overview (then re-expands any open areas).
document.getElementById('btn-relayout').onclick = null;
document.getElementById('btn-relayout').addEventListener('click', () => {
  layoutOverview(true);
  setTimeout(() => cy.fit(cy.nodes('[?is_area]'), 80), 600);
});
</script>
