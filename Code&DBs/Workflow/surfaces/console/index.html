<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Praxis" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/console/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/console/icon-192.png" />
  <title>Praxis Operator Console</title>
  <style>
    :root {
      --bg: #0b0d10;
      --bg-raised: #13171c;
      --border: #222831;
      --fg: #e7ecef;
      --fg-dim: #9aa3ad;
      --accent: #2dd4bf;
      --user-bubble: #1c2128;
      --assistant-bubble: #0f1216;
      --error: #ef4444;
      --plan: #facc15;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Mono", ui-monospace, Menlo, monospace; background: var(--bg); color: var(--fg); }
    #root { height: 100%; display: flex; flex-direction: column; }
    button, select, input, textarea { font: inherit; color: inherit; }
    button { background: var(--bg-raised); border: 1px solid var(--border); color: var(--fg); padding: 8px 14px; border-radius: 6px; cursor: pointer; touch-action: manipulation; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    select, input[type=text], input[type=password] { background: var(--bg-raised); border: 1px solid var(--border); color: var(--fg); padding: 8px 10px; border-radius: 6px; min-height: 40px; }
    .header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: var(--bg-raised); }
    .header .title { font-weight: 700; letter-spacing: 0.02em; margin-right: 8px; }
    .header select { flex: 1 1 130px; }
    .header .notify { font-size: 11px; padding: 7px 10px; }
    .install-card { margin: 8px 12px 0; padding: 8px 10px; border: 1px solid rgba(45, 212, 191, 0.28); border-radius: 10px; color: var(--fg-dim); background: rgba(45, 212, 191, 0.06); font-size: 11px; line-height: 1.4; }
    .install-card strong { color: var(--accent); }
    .turns { flex: 1 1 auto; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); max-width: 92%; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; line-height: 1.4; }
    .bubble.user { align-self: flex-end; background: var(--user-bubble); }
    .bubble.assistant { align-self: flex-start; background: var(--assistant-bubble); }
    .bubble.system { align-self: stretch; background: var(--bg-raised); color: var(--fg-dim); font-size: 12px; text-align: center; }
    .bubble.error { align-self: stretch; background: #2a1415; border-color: var(--error); color: var(--error); font-size: 13px; }
    .bubble.plan { align-self: flex-start; background: #1f1a05; border-color: var(--plan); max-width: 96%; }
    .bubble-meta { font-size: 10px; color: var(--fg-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .plan-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(250, 204, 21, 0.25); flex-wrap: wrap; }
    .plan-actions button { font-size: 12px; padding: 6px 12px; }
    .plan-actions button.primary { background: var(--plan); color: #1a1605; border-color: var(--plan); font-weight: 700; }
    .composer { padding: 10px; border-top: 1px solid var(--border); background: var(--bg-raised); display: flex; flex-direction: column; gap: 8px; }
    .composer textarea { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 10px; border-radius: 6px; resize: vertical; min-height: 64px; width: 100%; font-size: 15px; }
    .composer-actions { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .composer-actions button.primary { background: var(--accent); color: #03221f; border-color: var(--accent); font-weight: 700; flex: 1 1 120px; }
    .gate-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px; gap: 16px; text-align: center; }
    .gate-screen h1 { font-size: 20px; margin: 0; color: var(--accent); }
    .gate-screen p { color: var(--fg-dim); font-size: 14px; max-width: 32ch; }
    .gate-screen input { width: 100%; max-width: 360px; }
    .agents-bar { padding: 6px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; overflow-x: auto; background: var(--bg); }
    .agents-bar .chip { white-space: nowrap; padding: 5px 10px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; color: var(--fg-dim); background: var(--bg-raised); cursor: pointer; }
    .agents-bar .chip.active { color: var(--accent); border-color: var(--accent); }
    .agents-bar .chip.new { color: var(--accent); }
    .status-strip { padding: 4px 12px; font-size: 11px; color: var(--fg-dim); border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; gap: 6px; }
    .status-strip.live { color: var(--accent); }
    .status-strip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); flex: 0 0 auto; }
    .status-strip.live .dot { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .thinking-card { align-self: stretch; border: 1px solid rgba(45, 212, 191, 0.26); border-radius: 12px; padding: 10px 12px; background: linear-gradient(135deg, rgba(45, 212, 191, 0.10), rgba(19, 23, 28, 0.96)); color: var(--fg); font-size: 12px; display: grid; gap: 5px; }
    .thinking-card .eyebrow { color: var(--accent); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
    .thinking-card .detail { color: var(--fg-dim); line-height: 1.35; }
    .thinking-card .dots span { display: inline-block; width: 4px; height: 4px; margin-right: 4px; border-radius: 50%; background: var(--accent); animation: bounce 1s infinite ease-in-out; }
    .thinking-card .dots span:nth-child(2) { animation-delay: 0.14s; }
    .thinking-card .dots span:nth-child(3) { animation-delay: 0.28s; }
    .trace-list { display: grid; gap: 4px; margin-top: 4px; }
    .trace-step { display: grid; grid-template-columns: 54px 1fr; gap: 8px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.06); }
    .trace-step .state { color: var(--accent); font-size: 10px; text-transform: uppercase; }
    .trace-step.failed .state { color: var(--error); }
    .trace-step .copy { min-width: 0; }
    .trace-step .copy strong { display: block; font-size: 11px; }
    .trace-step .copy span { display: block; color: var(--fg-dim); overflow-wrap: anywhere; }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.35; } 40% { transform: translateY(-3px); opacity: 1; } }
    @media (min-width: 720px) {
      .bubble { max-width: 72ch; }
      .composer { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot" style="padding:24px;color:#9aa3ad;font-family:-apple-system,monospace;font-size:13px;line-height:1.6">
      <div style="color:#2dd4bf;font-weight:700;margin-bottom:8px">praxis console</div>
      <div id="boot-msg">loading runtime…</div>
      <div id="boot-err" style="color:#ef4444;margin-top:12px;white-space:pre-wrap;display:none"></div>
    </div>
  </div>
  <script>
    window.PraxisPWA = { ready: false, registration: null, installPrompt: null };
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      window.PraxisPWA.installPrompt = event;
      window.dispatchEvent(new Event('praxis-install-ready'));
    });
    if ('serviceWorker' in navigator && window.isSecureContext) {
      navigator.serviceWorker.register('/console/sw.js', { scope: '/console' })
        .then((registration) => {
          window.PraxisPWA.ready = true;
          window.PraxisPWA.registration = registration;
          window.dispatchEvent(new Event('praxis-pwa-ready'));
        })
        .catch((err) => console.warn('[console] service worker unavailable:', err && err.message));
    }
    window.addEventListener('error', (e) => {
      const el = document.getElementById('boot-err');
      if (el) { el.style.display = 'block'; el.textContent = 'JS error: ' + (e.message || e.error || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || ''); }
    });
    setTimeout(() => {
      const msg = document.getElementById('boot-msg');
      if (msg && document.querySelector('#root .header') === null && document.querySelector('#root .gate-screen') === null) {
        msg.textContent = 'still loading… vendor scripts may have failed.';
      }
    }, 5000);
  </script>
  <script src="/console/vendor/react.js"></script>
  <script src="/console/vendor/react-dom.js"></script>
  <script src="/console/vendor/htm.js"></script>
  <script>
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useRef, useCallback } = React;

    const CHAT_MODEL_LABEL = 'DeepSeek V4 Pro';

    const PERMISSION_MODES = [
      { value: 'read_only',     label: 'read only' },
      { value: 'plan_only',     label: 'plan only' },
      { value: 'propose_edits', label: 'propose edits' },
      { value: 'auto_edits',    label: 'auto edits' },
      { value: 'full_autonomy', label: 'full autonomy' },
    ];

    // Modes that produce a plan for approval (no execution).
    const PLAN_MODES = new Set(['read_only', 'plan_only']);

    // When a plan is approved, escalate mode so the agent can execute.
    // read_only → propose_edits (inline prompts for each action)
    // plan_only → auto_edits    (apply edits automatically, commands still prompt)
    const PLAN_APPROVAL_ESCALATION = {
      read_only: 'propose_edits',
      plan_only: 'auto_edits',
    };

    const CANNED_APPROVE_PROMPT = 'Approved. Proceed with the plan.';
    const CANNED_REJECT_PROMPT  = "Don't proceed. Reconsider the approach and propose a new plan.";

    const TOKEN_KEY = 'praxis.operator.token';
    const ACTIVE_KEY = 'praxis.operator.active_agent';

    // --- API client --------------------------------------------------------

    async function api(token, method, path, body) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(path, {
        method,
        headers,
        body: body === undefined ? undefined : JSON.stringify(body),
      });
      const text = await res.text();
      let payload;
      try { payload = text ? JSON.parse(text) : null; } catch { payload = { raw: text }; }
      if (!res.ok) {
        const detail = payload && payload.detail;
        const message = (detail && (detail.message || detail)) || `HTTP ${res.status}`;
        const err = new Error(typeof message === 'string' ? message : JSON.stringify(message));
        err.status = res.status;
        err.detail = detail;
        throw err;
      }
      return payload;
    }

    async function listAgents(token)                  { return api(token, 'GET',  '/api/agent-sessions/agents'); }
    async function createAgent(token, body)           { return api(token, 'POST', '/api/agent-sessions/agents', body); }
    async function sendMessage(token, id, body)       { return api(token, 'POST', `/api/agent-sessions/agents/${id}/messages`, body); }
    async function getMessages(token, id)             { return api(token, 'GET',  `/api/agent-sessions/agents/${id}/messages`); }

    // Stream turn events via fetch-based SSE.
    //
    // Browser EventSource can't carry Authorization headers, so the stream
    // opens as a plain fetch with text/event-stream response; we parse the
    // `data: ...\n\n` framing ourselves. onEvent is called for every parsed
    // JSON event payload. The signal aborts the underlying fetch.
    async function streamTurnEvents(token, id, onEvent, signal) {
      const headers = { 'Accept': 'text/event-stream' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(`/api/agent-sessions/agents/${id}/stream`, {
        headers,
        signal,
      });
      if (!res.ok || !res.body) {
        const err = new Error(`stream failed: HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let sep;
          while ((sep = buffer.indexOf('\n\n')) >= 0) {
            const frame = buffer.slice(0, sep);
            buffer = buffer.slice(sep + 2);
            const lines = frame.split('\n');
            const dataLines = lines
              .filter((l) => l.startsWith('data:'))
              .map((l) => l.slice(5).replace(/^\s/, ''));
            if (!dataLines.length) continue;
            const raw = dataLines.join('\n');
            try { onEvent(JSON.parse(raw)); }
            catch { /* ignore malformed frame */ }
          }
        }
      } finally {
        try { reader.releaseLock(); } catch { /* ignore */ }
      }
    }

    // --- Phone app + notifications ---------------------------------------

    function isStandaloneApp() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function notificationCapability() {
      if (!('Notification' in window)) return 'unsupported';
      if (!('serviceWorker' in navigator)) return 'unsupported';
      if (!window.isSecureContext) return 'needs_https';
      return Notification.permission || 'default';
    }

    async function requestNotifications() {
      const capability = notificationCapability();
      if (capability === 'unsupported' || capability === 'needs_https') return capability;
      const permission = await Notification.requestPermission();
      return permission;
    }

    async function showConsoleNotification(title, body) {
      if (notificationCapability() !== 'granted') return;
      try {
        const registration = window.PraxisPWA.registration || await navigator.serviceWorker.ready;
        if (registration && registration.active) {
          registration.active.postMessage({
            type: 'praxis.notify',
            title,
            body,
            tag: 'praxis-console-agent',
          });
          return;
        }
        if (registration && registration.showNotification) {
          await registration.showNotification(title, { body, icon: '/console/icon.svg', tag: 'praxis-console-agent' });
          return;
        }
      } catch (err) {
        console.warn('[console] notification failed:', err && err.message);
      }
      try { new Notification(title, { body, icon: '/console/icon.svg', tag: 'praxis-console-agent' }); } catch {}
    }

    function notificationBodyFromBubble(bubble) {
      const text = String((bubble && bubble.text) || '').replace(/\s+/g, ' ').trim();
      return text.length > 160 ? text.slice(0, 157) + '...' : text;
    }

    // --- Components --------------------------------------------------------

    function TokenGate({ onReady, notice }) {
      const [value, setValue] = useState('');
      const submit = () => {
        const trimmed = value.trim();
        if (!trimmed) return;
        localStorage.setItem(TOKEN_KEY, trimmed);
        onReady(trimmed);
      };
      return html`
        <div class="gate-screen">
          <h1>Praxis Operator Console</h1>
          <p>Watch and steer your agents from the road. Paste your PRAXIS_API_TOKEN — stored locally, sent only to the API.</p>
          ${notice ? html`<p style=${{ color: 'var(--error)' }}>${notice}</p>` : null}
          <input type="password" value=${value} onInput=${(e) => setValue(e.target.value)} placeholder="PRAXIS_API_TOKEN" autofocus />
          <button class="primary" onClick=${submit}>Unlock</button>
        </div>
      `;
    }

    function Bubble({ role, children, meta }) {
      return html`
        <div class=${`bubble ${role}`}>
          ${meta ? html`<div class="bubble-meta">${meta}</div>` : null}
          ${children}
        </div>
      `;
    }

    function turnEventBubbles(events, turnMode) {
      if (!events || !events.length) return [];
      const out = [];
      for (const ev of events) {
        const type = (ev && ev.type) || '';
        if (type === 'assistant' || type === 'assistant.reply') {
          const content = (ev.message && ev.message.content) || ev.text || '';
          if (content) out.push({ role: 'assistant', text: String(content), meta: ev.provider || 'assistant', permission_mode: turnMode });
        } else if (type === 'error') {
          out.push({ role: 'error', text: ev.message || 'error', meta: ev.error_code || 'error', permission_mode: turnMode });
        } else if (type === 'plan' || type === 'system.plan') {
          const plan = ev.plan || ev.message || JSON.stringify(ev, null, 2);
          out.push({ role: 'assistant', text: String(plan), meta: 'plan', permission_mode: turnMode });
        } else if (type === 'raw') {
          if (ev.data) out.push({ role: 'system', text: String(ev.data), meta: 'raw', permission_mode: turnMode });
        }
      }
      return out;
    }

    function turnPhaseFromEvent(ev) {
      const type = (ev && ev.type) || '';
      if (type === 'turn.accepted') {
        return { kind: 'seen', label: 'Message received', detail: ev.message || 'Praxis has the turn.' };
      }
      if (type === 'turn.stage') {
        return {
          kind: ev.status === 'failed' ? 'error' : (ev.status === 'ok' ? 'seen' : 'thinking'),
          key: ev.stage || ev.label || type,
          status: ev.status || 'running',
          label: ev.label || ev.stage || 'Turn stage',
          detail: ev.message || ''
        };
      }
      if (type === 'assistant.thinking') {
        return { kind: 'thinking', label: 'DeepSeek is thinking', detail: ev.message || 'The model is reading the turn.' };
      }
      if (type === 'praxis.lookup' || type === 'praxis.tool_call') {
        const tool = ev.tool ? ` · ${ev.tool}` : '';
        return { kind: 'lookup', label: 'Checking Praxis', detail: (ev.message || 'Reading live Praxis state.') + tool };
      }
      if (type === 'praxis.lookup.done' || type === 'praxis.tool_result') {
        return { kind: 'finishing', label: 'Praxis answered', detail: 'DeepSeek is turning that into a reply.' };
      }
      if (type === 'error') {
        return { kind: 'error', label: 'Failed', detail: ev.message || 'The turn failed.' };
      }
      if (type === 'assistant' || type === 'assistant.reply') {
        return null;
      }
      return undefined;
    }

    function mergeStep(steps, phase) {
      if (!phase) return steps || [];
      const key = phase.key || phase.label || phase.kind;
      const next = {
        key,
        label: phase.label || 'Working',
        detail: phase.detail || '',
        status: phase.status || (phase.kind === 'error' ? 'failed' : phase.kind === 'seen' ? 'ok' : 'running'),
      };
      const existing = (steps || []).filter((step) => step.key !== key);
      return [...existing, next].slice(-8);
    }

    function ThinkingCard({ phase, steps }) {
      if (!phase) return null;
      return html`
        <div class=${`thinking-card ${phase.kind || 'thinking'}`}>
          <div class="eyebrow">${phase.label}</div>
          <div class="detail">${phase.detail}</div>
          ${(steps && steps.length) ? html`
            <div class="trace-list">
              ${steps.map((step) => html`
                <div key=${step.key} class=${`trace-step ${step.status === 'failed' ? 'failed' : ''}`}>
                  <div class="state">${step.status || 'run'}</div>
                  <div class="copy"><strong>${step.label}</strong><span>${step.detail}</span></div>
                </div>
              `)}
            </div>
          ` : null}
          <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
        </div>
      `;
    }

    function PlanActions({ onApprove, onReject, onEdit, busy, escalateTo }) {
      return html`
        <div class="plan-actions">
          <button class="primary" onClick=${onApprove} disabled=${busy} title=${`Escalate to ${escalateTo} and proceed`}>Approve</button>
          <button onClick=${onReject} disabled=${busy}>Reject</button>
          <button onClick=${onEdit} disabled=${busy}>Edit</button>
        </div>
      `;
    }

    function Chat({ token, onLogout }) {
      const [agents, setAgents]         = useState([]);
      const [activeId, setActiveId]     = useState(localStorage.getItem(ACTIVE_KEY) || null);
      const [mode, setMode]             = useState('propose_edits');
      const [bubbles, setBubbles]       = useState([]);
      const [draft, setDraft]           = useState('');
      const [busy, setBusy]             = useState(false);
      const [streaming, setStreaming]   = useState(false);
      const [status, setStatus]         = useState('');
      const [turnPhase, setTurnPhase]   = useState(null);
      const [turnSteps, setTurnSteps]   = useState([]);
      const [notifyState, setNotifyState] = useState(notificationCapability());
      const [standalone, setStandalone] = useState(isStandaloneApp());
      const [installReady, setInstallReady] = useState(Boolean(window.PraxisPWA.installPrompt));
      const bottomRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        if (bottomRef.current) bottomRef.current.scrollTop = bottomRef.current.scrollHeight;
      }, []);

      // Keep the thinking card in view through the whole turn — phase events
      // (sending → thinking → tool calls → finishing) don't touch bubbles, so
      // without this the card can scroll out of sight on small viewports.
      useEffect(() => { if (turnPhase) setTimeout(scrollToBottom, 0); }, [turnPhase, scrollToBottom]);

      const refreshAgents = useCallback(async () => {
        try {
          const list = await listAgents(token);
          setAgents(Array.isArray(list) ? list : []);
        } catch (err) {
          if (err.status === 401 || err.status === 403) { onLogout('Access code rejected. Paste the current code printed by ./scripts/operator-console url.'); return; }
          setStatus(`agent list failed: ${err.message}`);
        }
      }, [token, onLogout]);

      const loadHistory = useCallback(async (id) => {
        try {
          const res = await getMessages(token, id);
          const events = (res && res.events) || [];
          const out = [];
          for (const ev of events) {
            const kind = ev.event_kind || ev.type || '';
            const text = ev.text_content || ev.text || '';
            if (!text) continue;
            const payload = (ev && ev.payload) || {};
            const eventMode = payload.permission_mode || null;
            if (kind === 'user.prompt')      out.push({ role: 'user',      text: String(text), permission_mode: eventMode });
            else if (kind === 'assistant.reply') out.push({ role: 'assistant', text: String(text), permission_mode: eventMode });
            else if (kind.startsWith('error'))   out.push({ role: 'error',     text: String(text), permission_mode: eventMode });
          }
          setBubbles(out);
          setTimeout(scrollToBottom, 0);
        } catch (err) {
          if (err.status === 401 || err.status === 403) { onLogout('Access code rejected. Paste the current code printed by ./scripts/operator-console url.'); return; }
          setStatus(`history load failed: ${err.message}`);
        }
      }, [token, scrollToBottom]);

      useEffect(() => { refreshAgents(); }, [refreshAgents]);
      useEffect(() => {
        const syncInstall = () => {
          setNotifyState(notificationCapability());
          setStandalone(isStandaloneApp());
          setInstallReady(Boolean(window.PraxisPWA.installPrompt));
        };
        window.addEventListener('praxis-pwa-ready', syncInstall);
        window.addEventListener('praxis-install-ready', syncInstall);
        window.matchMedia('(display-mode: standalone)').addEventListener?.('change', syncInstall);
        syncInstall();
        return () => {
          window.removeEventListener('praxis-pwa-ready', syncInstall);
          window.removeEventListener('praxis-install-ready', syncInstall);
          window.matchMedia('(display-mode: standalone)').removeEventListener?.('change', syncInstall);
        };
      }, []);
      useEffect(() => {
        setTurnPhase(null);
        setTurnSteps([]);
        if (activeId) { localStorage.setItem(ACTIVE_KEY, activeId); loadHistory(activeId); }
        else { localStorage.removeItem(ACTIVE_KEY); setBubbles([]); }
      }, [activeId, loadHistory]);

      const enableNotifications = async () => {
        const result = await requestNotifications();
        setNotifyState(result);
        if (result === 'granted') {
          setStatus('notifications on');
          await showConsoleNotification('Praxis notifications on', 'I can notify you when agent replies land.');
        } else if (result === 'needs_https') {
          setStatus('notifications need HTTPS / secure Tailscale Serve');
        } else {
          setStatus(`notifications ${result}`);
        }
      };

      const installApp = async () => {
        if (window.PraxisPWA.installPrompt) {
          const prompt = window.PraxisPWA.installPrompt;
          window.PraxisPWA.installPrompt = null;
          setInstallReady(false);
          await prompt.prompt();
          setStandalone(isStandaloneApp());
        } else {
          setStatus('iPhone: Share button, then Add to Home Screen');
        }
      };

      const newAgent = async () => {
        setBusy(true);
        setStatus('creating agent…');
        try {
          const agent = await createAgent(token, { permission_mode: mode });
          await refreshAgents();
          setActiveId(agent.agent_id);
          setBubbles([]);
          setStatus('');
          return agent;
        } catch (err) {
          setStatus(`create failed: ${err.message}`);
          return null;
        } finally {
          setBusy(false);
        }
      };

      const dispatchMessage = useCallback(async (prompt, turnMode) => {
        if (!prompt || busy) return;
        let turnAgentId = activeId;
        if (!turnAgentId) {
          const agent = await newAgent();
          turnAgentId = agent && agent.agent_id;
          if (!turnAgentId) return;
        }
        setBusy(true);
        setStreaming(true);
        setStatus('sending…');
        const sendingPhase = { kind: 'sending', key: 'client_send', status: 'running', label: 'Sending', detail: 'Sending your message to Praxis.' };
        setTurnPhase(sendingPhase);
        setTurnSteps([sendingPhase]);
        setBubbles((prev) => [...prev, { role: 'user', text: prompt, permission_mode: turnMode }]);
        setTimeout(scrollToBottom, 0);

        // Stream-first: open the event stream BEFORE firing POST so we see
        // the agent's work as it happens, not in a lump at the end.
        const streamCtrl = new AbortController();
        // Track the terminal event explicitly. The server enqueues the
        // assistant reply onto the SSE queue and *then* returns the POST
        // response; AbortController.abort() can tear the stream down before
        // that final frame flushes, leaving the reply orphaned in the queue.
        // Gating the fallback on this flag (not on "any bubble streamed")
        // makes us pull from postResult.turn_events whenever that race hits.
        let sawAssistantReply = false;

        const streamPromise = streamTurnEvents(token, turnAgentId, (ev) => {
          const evType = (ev && ev.type) || '';
          if (evType === 'assistant' || evType === 'assistant.reply' || evType === 'error') {
            sawAssistantReply = true;
          }
          const nextPhase = turnPhaseFromEvent(ev);
          if (nextPhase === null) {
            setTurnPhase(null);
          } else if (nextPhase) {
            setTurnPhase(nextPhase);
            setTurnSteps((prev) => mergeStep(prev, nextPhase));
          }
          const bubbles = turnEventBubbles([ev], turnMode);
          if (bubbles.length) {
            setBubbles((prev) => [...prev, ...bubbles]);
            const last = bubbles[bubbles.length - 1];
            if (document.hidden && (last.role === 'assistant' || last.role === 'error')) {
              showConsoleNotification(last.role === 'error' ? 'Praxis agent error' : 'Praxis agent replied', notificationBodyFromBubble(last));
            }
            setTimeout(scrollToBottom, 0);
          }
          setStatus(nextPhase && nextPhase.label ? nextPhase.label.toLowerCase() : 'agent is working…');
        }, streamCtrl.signal).catch((err) => {
          if (err && err.name !== 'AbortError') {
            console.warn('[console] stream error:', err.message);
          }
        });

        let postResult = null;
        let postError = null;
        try {
          postResult = await sendMessage(token, turnAgentId, { prompt, permission_mode: turnMode });
        } catch (err) {
          postError = err;
        } finally {
          streamCtrl.abort();
          try { await streamPromise; } catch { /* already handled */ }
          setStreaming(false);
        }

        if (postError) {
          if (postError.status === 401 || postError.status === 403) {
            onLogout('Access code rejected. Paste the current code printed by ./scripts/operator-console url.');
            return;
          }
          setBubbles((prev) => [...prev, {
            role: 'error',
            text: postError.message,
            meta: (postError.detail && postError.detail.error_code) || 'error',
            permission_mode: turnMode,
          }]);
          const failedPhase = { kind: 'error', key: 'post_error', status: 'failed', label: 'Failed', detail: postError.message };
          setTurnPhase(failedPhase);
          setTurnSteps((prev) => mergeStep(prev, failedPhase));
          if (document.hidden) {
            showConsoleNotification('Praxis agent error', postError.message);
          }
        } else if (!sawAssistantReply && postResult) {
          for (const ev of (postResult.turn_events || [])) {
            const phase = turnPhaseFromEvent(ev);
            if (phase) setTurnSteps((prev) => mergeStep(prev, phase));
          }
          // Stream delivered nothing (maybe it never connected). Fall back
          // to the POST response's turn_events so the user still sees the reply.
          const replies = turnEventBubbles(postResult.turn_events, turnMode);
          if (!replies.length && postResult.reply) {
            replies.push({ role: 'assistant', text: postResult.reply, permission_mode: turnMode });
          }
          setBubbles((prev) => [...prev, ...replies]);
          const last = replies[replies.length - 1];
          if (document.hidden && last) {
            showConsoleNotification('Praxis agent replied', notificationBodyFromBubble(last));
          }
          setTurnPhase(null);
        }

        setStatus('');
        if (!postError) {
          setTurnPhase(null);
          setTurnSteps([]);
        }
        setBusy(false);
        setTimeout(scrollToBottom, 0);
      }, [activeId, busy, token, scrollToBottom]);

      const send = async () => {
        const prompt = draft.trim();
        if (!prompt) return;
        setDraft('');
        await dispatchMessage(prompt, mode);
      };

      const approvePlan = useCallback(async (fromMode) => {
        const escalateTo = PLAN_APPROVAL_ESCALATION[fromMode] || 'auto_edits';
        setMode(escalateTo);
        await dispatchMessage(CANNED_APPROVE_PROMPT, escalateTo);
      }, [dispatchMessage]);

      const rejectPlan = useCallback(async (fromMode) => {
        await dispatchMessage(CANNED_REJECT_PROMPT, fromMode || 'plan_only');
      }, [dispatchMessage]);

      const editPlan = useCallback(() => {
        const textarea = document.querySelector('.composer textarea');
        if (textarea) textarea.focus();
      }, []);

      const onKeyDown = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); }
      };

      const activeAgent = agents.find((a) => a.session_id === activeId || a.agent_id === activeId) || null;

      return html`
        <div class="header">
          <div class="title">praxis · ${CHAT_MODEL_LABEL}</div>
          <select value=${mode} onChange=${(e) => setMode(e.target.value)} disabled=${busy}>
            ${PERMISSION_MODES.map((m) => html`<option key=${m.value} value=${m.value}>${m.label}</option>`)}
          </select>
          <button class="notify" onClick=${enableNotifications} disabled=${busy || notifyState === 'granted'}>
            ${notifyState === 'granted' ? 'alerts on' : notifyState === 'needs_https' ? 'alerts need https' : 'alerts'}
          </button>
          <button onClick=${newAgent} disabled=${busy}>new</button>
        </div>
        ${standalone ? null : html`
          <div class="install-card" onClick=${installApp}>
            <strong>Install:</strong>
            ${installReady
              ? 'Tap here to install Praxis.'
              : 'Android Chrome: tap ⋮, then Install app or Add to Home screen. If that option is missing, refresh this HTTPS page once.'}
          </div>
        `}
        <div class="agents-bar">
          ${agents.length === 0 ? html`<div class="chip" onClick=${newAgent}>+ start one</div>` : null}
          ${agents.map((a) => {
            const id = a.session_id || a.agent_id;
            const label = a.display_title || a.title || id.slice(0, 8);
            const cls = id === activeId ? 'chip active' : 'chip';
            return html`<div key=${id} class=${cls} onClick=${() => setActiveId(id)}>${label}</div>`;
          })}
          <div class="chip new" onClick=${newAgent}>+ new</div>
        </div>
        <div class=${`status-strip${streaming ? ' live' : ''}`}>
          <span class="dot"></span>
          ${activeAgent ? `${CHAT_MODEL_LABEL} · ${activeAgent.status || ''}` : 'no agent'}
          ${status ? html`<span>· ${status}</span>` : null}
          ${streaming ? html`<span>· ${(turnPhase && turnPhase.label) ? turnPhase.label.toLowerCase() : 'watching'}</span>` : null}
        </div>
        <div class="turns" ref=${bottomRef}>
          ${bubbles.length === 0
            ? html`<${Bubble} role="system">${activeId ? 'Agent idle. Prompt it to wake it up. Cmd/Ctrl+Enter sends.' : 'Pick an agent to watch, or start a new one.'}<//>`
            : bubbles.map((b, i) => {
                // A bubble is a plan when the turn that produced it ran in a
                // plan-producing mode (plan_only / read_only). For assistant
                // replies we pair on index: the previous user bubble carries
                // the mode of this turn.
                const priorUser = (b.role === 'assistant') ? bubbles[i - 1] : null;
                const turnMode = (priorUser && priorUser.role === 'user' && priorUser.permission_mode) || b.permission_mode || null;
                const isPlan = b.role === 'assistant' && PLAN_MODES.has(turnMode);
                const isLatestPlan = isPlan && i === bubbles.length - 1;
                const displayRole = isPlan ? 'plan' : b.role;
                return html`
                  <${Bubble} key=${i} role=${displayRole} meta=${b.meta || (isPlan ? 'plan' : null)}>
                    ${b.text}
                    ${isLatestPlan
                      ? html`<${PlanActions}
                          busy=${busy}
                          escalateTo=${PLAN_APPROVAL_ESCALATION[turnMode] || 'auto_edits'}
                          onApprove=${() => approvePlan(turnMode)}
                          onReject=${() => rejectPlan(turnMode)}
                          onEdit=${editPlan}
                        />`
                      : null}
                  <//>
                `;
              })
          }
          ${turnPhase ? html`<${ThinkingCard} phase=${turnPhase} steps=${turnSteps} />` : null}
        </div>
        <div class="composer">
          <textarea
            value=${draft}
            onInput=${(e) => setDraft(e.target.value)}
            onKeyDown=${onKeyDown}
            placeholder=${activeId ? "Steer the agent. Cmd/Ctrl+Enter sends." : "What should the agent start working on? A new agent will be created on send."}
            disabled=${busy}
          />
          <div class="composer-actions">
            <div style=${{ color: 'var(--fg-dim)', fontSize: '11px' }}>${CHAT_MODEL_LABEL} · ${mode.replace('_', ' ')}</div>
            <button class="primary" onClick=${send} disabled=${busy || !draft.trim()}>${busy ? '…' : 'send'}</button>
          </div>
        </div>
      `;
    }

    function App() {
      const [token, setToken] = useState(localStorage.getItem(TOKEN_KEY) || '');
      const [notice, setNotice] = useState('');
      const handleLogout = (message) => {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(ACTIVE_KEY);
        setNotice(message || '');
        setToken('');
      };
      const handleReady = (nextToken) => {
        setNotice('');
        setToken(nextToken);
      };
      return html`<${Chat} token=${token} onLogout=${handleLogout} />`;
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) {
        try { console.error('[ErrorBoundary]', error && error.message, info && info.componentStack); } catch {}
      }
      render() {
        if (this.state.error) {
          const msg = (this.state.error && (this.state.error.message || String(this.state.error))) || 'unknown error';
          const stack = (this.state.error && this.state.error.stack) || '';
          return React.createElement('pre', {
            style: { padding: '20px', color: '#ef4444', whiteSpace: 'pre-wrap', fontSize: '12px', fontFamily: 'monospace', background: '#0b0d10', minHeight: '100vh' }
          }, 'Render crashed:\n\n' + msg + '\n\n' + stack);
        }
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(
      html`<${ErrorBoundary}><${App} /><//>`
    );
  </script>
</body>
</html>
