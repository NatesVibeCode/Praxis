<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipts - Praxis Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .nav-links {
            margin-top: 15px;
            font-size: 12px;
        }

        .nav-links a {
            color: #79c0ff;
            text-decoration: none;
            margin-right: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 14px;
            color: #79c0ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .filter-label {
            font-size: 12px;
            color: #8b949e;
        }

        select, input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }

        thead {
            background: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        th {
            padding: 10px;
            text-align: left;
            color: #79c0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        th:hover {
            background: #161b22;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #30363d;
        }

        tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-success {
            background: rgba(26, 127, 55, 0.2);
            color: #3fb950;
        }

        .badge-failed {
            background: rgba(172, 51, 51, 0.2);
            color: #f85149;
        }

        .badge-pending {
            background: rgba(184, 128, 25, 0.2);
            color: #d29922;
        }

        .receipt-detail {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-top: 10px;
            padding: 15px;
            display: none;
        }

        .receipt-detail.open {
            display: block;
        }

        .receipt-json {
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            overflow-x: auto;
            font-size: 11px;
            line-height: 1.4;
        }

        .copy-button {
            background: transparent;
            border: 1px solid #30363d;
            color: #79c0ff;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            transition: all 0.2s;
        }

        .copy-button:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8b949e;
        }

        .error {
            background: rgba(172, 51, 51, 0.15);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #8b949e;
        }

        .refresh-info {
            text-align: right;
            font-size: 11px;
            color: #8b949e;
            margin-top: 20px;
        }

        .receipt-id {
            color: #79c0ff;
            word-break: break-all;
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 10px;
        }

        .receipt-detail-row {
            padding: 8px 0;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }

        .receipt-detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #8b949e;
            font-size: 11px;
        }

        .detail-value {
            color: #c9d1d9;
            font-weight: bold;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Workflow Receipts</h1>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="queue.html">Queue</a>
                <a href="receipts.html">Receipts</a>
            </div>
        </header>

        <div id="error-container"></div>

        <div class="card">
            <h2>Filters</h2>
            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select id="filter-status">
                        <option value="">All</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Provider</label>
                    <select id="filter-provider">
                        <option value="">All</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="openai">OpenAI</option>
                        <option value="google">Google</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Min Latency (ms)</label>
                    <input type="number" id="filter-latency-min" placeholder="0" style="width: 80px;">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Max Cost ($)</label>
                    <input type="number" id="filter-cost-max" placeholder="0" step="0.01" style="width: 80px;">
                </div>
                <button class="copy-button" onclick="clearFilters()">Reset</button>
            </div>
        </div>

        <div class="card">
            <h2>Receipts</h2>
            <div id="receipts-display" class="table-wrapper loading">Loading...</div>
        </div>

        <div class="refresh-info">
            Last updated: <span id="last-updated">--:--:--</span> (auto-refresh every 30s)
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const REFRESH_INTERVAL = 30000;
        let allReceipts = [];
        let refreshTimer;

        async function fetchReceipts() {
            try {
                const response = await fetch(`${API_BASE}/receipts`);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (error) {
                showError(`Failed to fetch receipts: ${error.message}`);
                return [];
            }
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getStatusBadgeClass(status) {
            const lower = status.toLowerCase();
            if (lower === 'success') return 'badge-success';
            if (lower === 'failed') return 'badge-failed';
            if (lower === 'pending') return 'badge-pending';
            return '';
        }

        function getFilters() {
            return {
                status: document.getElementById('filter-status').value,
                provider: document.getElementById('filter-provider').value,
                latencyMin: parseInt(document.getElementById('filter-latency-min').value) || 0,
                costMax: parseFloat(document.getElementById('filter-cost-max').value) || Infinity,
            };
        }

        function applyFilters() {
            const filters = getFilters();
            const filtered = allReceipts.filter(receipt => {
                if (filters.status && receipt.status !== filters.status) return false;
                if (filters.provider && receipt.provider !== filters.provider) return false;
                if (receipt.latency_ms < filters.latencyMin) return false;
                if ((receipt.cost_usd || 0) > filters.costMax) return false;
                return true;
            });

            updateReceiptsTable(filtered);
        }

        function updateReceiptsTable(receipts) {
            if (!receipts || receipts.length === 0) {
                document.getElementById('receipts-display').innerHTML = '<div class="empty-state">No receipts found</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortBy('label')">Label</th>
                            <th onclick="sortBy('status')">Status</th>
                            <th onclick="sortBy('provider')">Provider</th>
                            <th onclick="sortBy('latency_ms')">Latency (ms)</th>
                            <th onclick="sortBy('cost_usd')">Cost ($)</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="receipts-tbody">
            `;

            receipts.forEach((receipt, idx) => {
                const badgeClass = getStatusBadgeClass(receipt.status);
                html += `
                    <tr onclick="toggleDetail(${idx})">
                        <td><span class="receipt-id">${escapeHtml(receipt.label || 'unlabeled')}</span></td>
                        <td><span class="status-badge ${badgeClass}">${escapeHtml(receipt.status)}</span></td>
                        <td>${escapeHtml(receipt.provider || '?')}</td>
                        <td>${receipt.latency_ms || '—'}</td>
                        <td>$${(receipt.cost_usd || 0).toFixed(4)}</td>
                        <td>
                            <button class="copy-button" onclick="event.stopPropagation(); copyReceipt(${idx})">Copy</button>
                        </td>
                    </tr>
                    <tr id="detail-row-${idx}">
                        <td colspan="6">
                            <div id="detail-${idx}" class="receipt-detail">
                                <div class="receipt-header">
                                    <span>Receipt Details</span>
                                    <button class="copy-button" onclick="copyReceipt(${idx})">Copy JSON</button>
                                </div>
                                <div class="receipt-json"><pre>${escapeHtml(JSON.stringify(receipt, null, 2))}</pre></div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('receipts-display').innerHTML = html;
        }

        function toggleDetail(idx) {
            const detail = document.getElementById(`detail-${idx}`);
            if (detail) {
                detail.classList.toggle('open');
            }
        }

        function copyReceipt(idx) {
            if (idx < allReceipts.length) {
                const json = JSON.stringify(allReceipts[idx], null, 2);
                navigator.clipboard.writeText(json).then(() => {
                    // Flash feedback
                    const btn = event.target;
                    const original = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(() => {
                        btn.textContent = original;
                    }, 1500);
                }).catch(err => {
                    showError('Failed to copy: ' + err.message);
                });
            }
        }

        function clearFilters() {
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-provider').value = '';
            document.getElementById('filter-latency-min').value = '';
            document.getElementById('filter-cost-max').value = '';
            applyFilters();
        }

        function sortBy(field) {
            allReceipts.sort((a, b) => {
                const aVal = a[field] || 0;
                const bVal = b[field] || 0;
                if (typeof aVal === 'string') {
                    return bVal.localeCompare(aVal);
                }
                return bVal - aVal;
            });
            applyFilters();
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleTimeString();
        }

        async function refresh() {
            clearError();
            const receipts = await fetchReceipts();
            allReceipts = receipts;
            applyFilters();
            updateTimestamp();
        }

        function startAutoRefresh() {
            refresh();
            refreshTimer = setInterval(refresh, REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
        }

        // Filter listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('filter-status').addEventListener('change', applyFilters);
            document.getElementById('filter-provider').addEventListener('change', applyFilters);
            document.getElementById('filter-latency-min').addEventListener('input', applyFilters);
            document.getElementById('filter-cost-max').addEventListener('input', applyFilters);
            startAutoRefresh();
        });

        window.addEventListener('beforeunload', stopAutoRefresh);
    </script>
</body>
</html>
