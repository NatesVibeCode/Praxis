<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis Engine Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .health-banner {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .health-banner.healthy {
            background: rgba(26, 127, 55, 0.15);
            border-left: 4px solid #1a7f37;
            color: #3fb950;
        }

        .health-banner.degraded {
            background: rgba(184, 128, 25, 0.15);
            border-left: 4px solid #b88018;
            color: #d29922;
        }

        .health-banner.unhealthy {
            background: rgba(172, 51, 51, 0.15);
            border-left: 4px solid #ac3333;
            color: #f85149;
        }

        .health-status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .health-banner.healthy .health-status-dot {
            background: #3fb950;
        }

        .health-banner.degraded .health-status-dot {
            background: #d29922;
        }

        .health-banner.unhealthy .health-status-dot {
            background: #f85149;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .grid-3 {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }

        .card h2 {
            font-size: 14px;
            color: #79c0ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .big-number {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
        }

        .big-number .value {
            font-size: 36px;
            font-weight: bold;
            color: #58a6ff;
        }

        .big-number .unit {
            font-size: 14px;
            color: #8b949e;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #8b949e;
        }

        .metric-value {
            color: #79c0ff;
            font-weight: bold;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .bar-label {
            width: 100px;
            color: #8b949e;
        }

        .bar-container {
            flex: 1;
            height: 24px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #58a6ff, #79c0ff);
            transition: width 0.3s ease;
        }

        .bar-value {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #c9d1d9;
            font-weight: bold;
        }

        .circuit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .circuit-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            font-size: 12px;
        }

        .circuit-state {
            font-size: 18px;
            font-weight: bold;
            margin: 8px 0;
            padding: 8px;
            border-radius: 4px;
        }

        .circuit-state.closed {
            background: rgba(26, 127, 55, 0.15);
            color: #3fb950;
        }

        .circuit-state.open {
            background: rgba(172, 51, 51, 0.15);
            color: #f85149;
        }

        .circuit-state.half-open {
            background: rgba(184, 128, 25, 0.15);
            color: #d29922;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }

        thead {
            background: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        th {
            padding: 10px;
            text-align: left;
            color: #79c0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #30363d;
        }

        tbody tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }

        .failure-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .failure-item {
            background: #0d1117;
            border-left: 3px solid #f85149;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .failure-time {
            color: #8b949e;
            font-size: 11px;
        }

        .failure-run-id {
            color: #79c0ff;
            font-weight: bold;
            word-break: break-all;
        }

        .failure-code {
            color: #f85149;
            margin-top: 4px;
        }

        .mini-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mini-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 4px;
            background: #0d1117;
            border: 1px solid #30363d;
            font-size: 12px;
        }

        .mini-item .mini-label {
            color: #8b949e;
        }

        .mini-item .mini-value {
            color: #79c0ff;
            font-weight: bold;
            text-align: right;
            word-break: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-healthy {
            background: rgba(26, 127, 55, 0.2);
            color: #3fb950;
        }

        .badge-unhealthy {
            background: rgba(172, 51, 51, 0.2);
            color: #f85149;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8b949e;
        }

        .error {
            background: rgba(172, 51, 51, 0.15);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .refresh-info {
            text-align: right;
            font-size: 11px;
            color: #8b949e;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Praxis Engine Dashboard</h1>
        </header>

        <div id="error-container"></div>

        <div id="health-container"></div>

        <div id="dispatch-summary" class="grid-2">
            <div class="card">
                <h2>Workflow Summary</h2>
                <div id="dispatch-metrics" class="loading">Loading...</div>
            </div>
            <div class="card">
                <h2>Cost Summary</h2>
                <div id="cost-metrics" class="loading">Loading...</div>
            </div>
        </div>

        <div id="observability-summary" class="grid-2">
            <div class="card">
                <h2>Observability Efficiency</h2>
                <div id="observability-metrics" class="loading">Loading...</div>
            </div>
            <div class="card">
                <h2>Failure Categories</h2>
                <div id="failure-categories" class="loading">Loading...</div>
            </div>
        </div>

        <div id="volume-container" class="card" style="margin-bottom: 20px;">
            <h2>Hourly Workflow Volume</h2>
            <div id="volume-display" class="loading">Loading...</div>
        </div>

        <div id="cost-chart-container" class="card" style="margin-bottom: 20px;">
            <h2>Cost by Agent</h2>
            <div id="cost-chart" class="bar-chart"></div>
        </div>

        <div id="circuit-container" class="card" style="margin-bottom: 20px;">
            <h2>Circuit Breakers</h2>
            <div id="circuit-display" class="circuit-grid"></div>
        </div>

        <div id="leaderboard-container" class="card" style="margin-bottom: 20px;">
            <h2>Top Agents</h2>
            <div id="leaderboard-display" class="table-wrapper"></div>
        </div>

        <div id="failures-container" class="card">
            <h2>Recent Failures</h2>
            <div id="failures-display"></div>
        </div>

        <div class="refresh-info">
            Last updated: <span id="last-updated">--:--:--</span> (auto-refresh every 30s)
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const REFRESH_INTERVAL = 30000;
        let refreshTimer;

        async function fetchDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (error) {
                showError(`Failed to fetch dashboard: ${error.message}`);
                return null;
            }
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateHealthBanner(health) {
            const container = document.getElementById('health-container');
            const healthClass = health.toLowerCase();
            const statusText = health.toUpperCase();

            container.innerHTML = `
                <div class="health-banner ${healthClass}">
                    <span class="health-status-dot"></span>
                    <span>System Status: ${statusText}</span>
                </div>
            `;
        }

        function updateDispatchMetrics(summary) {
            const html = `
                <div class="metric-row">
                    <span class="metric-label">Total Workflow Runs</span>
                    <span class="metric-value">${summary.total_workflows}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Succeeded</span>
                    <span class="metric-value">${summary.succeeded}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Failed</span>
                    <span class="metric-value">${summary.failed}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Pass Rate</span>
                    <span class="metric-value">${summary.pass_rate.toFixed(1)}%</span>
                </div>
            `;
            document.getElementById('dispatch-metrics').innerHTML = html;
        }

        function updateCostMetrics(costs) {
            const html = `
                <div class="metric-row">
                    <span class="metric-label">Total Cost</span>
                    <span class="metric-value">$${costs.total_cost_usd.toFixed(2)}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Input Tokens</span>
                    <span class="metric-value">${costs.total_input_tokens.toLocaleString()}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Output Tokens</span>
                    <span class="metric-value">${costs.total_output_tokens.toLocaleString()}</span>
                </div>
            `;
            document.getElementById('cost-metrics').innerHTML = html;
        }

        function updateObservability(observability) {
            const efficiency = observability.efficiency_summary || {};
            const failureCategories = observability.failure_category_breakdown || [];
            const hourlyVolume = observability.hourly_workflow_volume || [];
            const latency = observability.latency_percentiles || {};

            const metricsHtml = `
                <div class="metric-row">
                    <span class="metric-label">First-Pass Success</span>
                    <span class="metric-value">${((efficiency.first_pass_success_rate || 0) * 100).toFixed(1)}%</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Retry Success</span>
                    <span class="metric-value">${((efficiency.retry_success_rate || 0) * 100).toFixed(1)}%</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Cost / Success</span>
                    <span class="metric-value">$${Number(efficiency.cost_per_success_usd || 0).toFixed(6)}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Tokens / Success</span>
                    <span class="metric-value">${Number(efficiency.tokens_per_success || 0).toFixed(2)}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Avg Latency</span>
                    <span class="metric-value">${Number(efficiency.avg_latency_ms || 0).toFixed(2)} ms</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Avg Tool Uses</span>
                    <span class="metric-value">${Number(efficiency.avg_tool_uses || 0).toFixed(2)}</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Latency p95 / p99</span>
                    <span class="metric-value">${Number(latency.p95 || 0)} / ${Number(latency.p99 || 0)} ms</span>
                </div>
            `;
            document.getElementById('observability-metrics').innerHTML = metricsHtml;

            if (!failureCategories.length) {
                document.getElementById('failure-categories').innerHTML = '<div class="empty-state">No failures recorded in the selected window</div>';
            } else {
                let failureHtml = '<div class="mini-list">';
                failureCategories.slice(0, 6).forEach(row => {
                    failureHtml += `
                        <div class="mini-item">
                            <span class="mini-label">${escapeHtml(row.failure_category || 'unknown')} / ${escapeHtml(row.failure_zone || 'unknown')}</span>
                            <span class="mini-value">${row.count} (${row.pct}%)</span>
                        </div>
                    `;
                });
                failureHtml += '</div>';
                document.getElementById('failure-categories').innerHTML = failureHtml;
            }

            if (!hourlyVolume.length) {
                document.getElementById('volume-display').innerHTML = '<div class="empty-state">No volume data available</div>';
                return;
            }

            let volumeHtml = '<div class="mini-list">';
            hourlyVolume.slice(0, 12).forEach(row => {
                volumeHtml += `
                    <div class="mini-item">
                        <span class="mini-label">${escapeHtml(String(row.hour || 'unknown'))}</span>
                        <span class="mini-value">${row.count}</span>
                    </div>
                `;
            });
            volumeHtml += '</div>';
            document.getElementById('volume-display').innerHTML = volumeHtml;
        }

        function updateCostChart(costs) {
            const providers = costs.cost_by_agent || costs.cost_by_provider || {};
            const total = Object.values(providers).reduce((a, b) => a + b, 0);

            if (total === 0) {
                document.getElementById('cost-chart').innerHTML = '<div class="empty-state">No cost data available</div>';
                return;
            }

            let html = '';
            Object.entries(providers)
                .sort((a, b) => b[1] - a[1])
                .forEach(([provider, cost]) => {
                    const percentage = (cost / total * 100).toFixed(1);
                    html += `
                        <div class="bar-row">
                            <div class="bar-label">${escapeHtml(provider)}</div>
                            <div class="bar-container">
                                <div class="bar-fill" style="width: ${percentage}%">
                                    <span class="bar-value">$${cost.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

            document.getElementById('cost-chart').innerHTML = html;
        }

        function updateCircuits(circuits) {
            const providers = circuits || {};

            if (Object.keys(providers).length === 0) {
                document.getElementById('circuit-display').innerHTML = '<div class="empty-state">No circuit data available</div>';
                return;
            }

            let html = '';
            Object.entries(providers).forEach(([provider, state]) => {
                const stateClass = state.state.toLowerCase().replace('_', '-');
                html += `
                    <div class="circuit-card">
                        <div style="color: #79c0ff; font-weight: bold;">${escapeHtml(provider)}</div>
                        <div class="circuit-state ${stateClass}">${state.state}</div>
                        <div style="font-size: 11px; color: #8b949e;">
                            Success: ${state.success_count}<br>
                            Failed: ${state.failure_count}
                        </div>
                    </div>
                `;
            });

            document.getElementById('circuit-display').innerHTML = html;
        }

        function updateLeaderboard(leaderboard) {
            if (!leaderboard || leaderboard.length === 0) {
                document.getElementById('leaderboard-display').innerHTML = '<div class="empty-state">No agent data available</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Provider</th>
                            <th>Model</th>
                            <th>Workflow Runs</th>
                            <th>Pass %</th>
                            <th>Avg Latency (ms)</th>
                            <th>Cost/Run</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            leaderboard.forEach(agent => {
                html += `
                    <tr>
                        <td>${escapeHtml(agent.provider_slug)}</td>
                        <td>${escapeHtml(agent.model_slug)}</td>
                        <td>${agent.total_workflows}</td>
                        <td>${agent.pass_rate.toFixed(1)}%</td>
                        <td>${agent.avg_latency_ms}</td>
                        <td>$${agent.avg_cost_per_workflow.toFixed(4)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('leaderboard-display').innerHTML = html;
        }

        function updateFailures(failures) {
            if (!failures || failures.length === 0) {
                document.getElementById('failures-display').innerHTML = '<div class="empty-state">No failures recorded</div>';
                return;
            }

            let html = '<div class="failure-list">';
            failures.forEach(failure => {
                const time = new Date(failure.finished_at).toLocaleTimeString();
                html += `
                    <div class="failure-item">
                        <div class="failure-time">${time}</div>
                        <div class="failure-run-id">Run: ${escapeHtml(failure.run_id)}</div>
                        <div class="failure-code">${escapeHtml(failure.provider_slug)} / ${escapeHtml(failure.failure_code)}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('failures-display').innerHTML = html;
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleTimeString();
        }

        async function refresh() {
            clearError();
            const data = await fetchDashboard();

            if (data) {
                updateHealthBanner(data.system_health || 'unknown');
                updateDispatchMetrics(data.workflow_summary || {});
                updateCostMetrics(data.cost_summary || {});
                updateObservability(data.observability || {});
                updateCostChart(data.cost_summary || {});
                updateCircuits(data.circuit_states || {});
                updateLeaderboard(data.leaderboard || []);
                updateFailures(data.recent_failures || []);
                updateTimestamp();
            }
        }

        function startAutoRefresh() {
            refresh();
            refreshTimer = setInterval(refresh, REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
        }

        // Start on page load
        document.addEventListener('DOMContentLoaded', startAutoRefresh);
        window.addEventListener('beforeunload', stopAutoRefresh);
    </script>
</body>
</html>
