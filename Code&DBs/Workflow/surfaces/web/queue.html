<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Queue - Praxis Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .nav-links {
            margin-top: 15px;
            font-size: 12px;
        }

        .nav-links a {
            color: #79c0ff;
            text-decoration: none;
            margin-right: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 14px;
            color: #79c0ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }

        thead {
            background: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        th {
            padding: 10px;
            text-align: left;
            color: #79c0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #30363d;
        }

        tbody tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-pending {
            background: rgba(184, 128, 25, 0.2);
            color: #d29922;
        }

        .badge-running {
            background: rgba(88, 166, 255, 0.2);
            color: #58a6ff;
        }

        .badge-completed {
            background: rgba(26, 127, 55, 0.2);
            color: #3fb950;
        }

        .badge-failed {
            background: rgba(172, 51, 51, 0.2);
            color: #f85149;
        }

        .button {
            background: transparent;
            border: 1px solid #30363d;
            color: #79c0ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            transition: all 0.2s;
        }

        .button:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .button.danger {
            color: #f85149;
            border-color: #f85149;
        }

        .button.danger:hover {
            background: rgba(172, 51, 51, 0.2);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8b949e;
        }

        .error {
            background: rgba(172, 51, 51, 0.15);
            border: 1px solid #f85149;
            color: #f85149;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #8b949e;
        }

        .refresh-info {
            text-align: right;
            font-size: 11px;
            color: #8b949e;
            margin-top: 20px;
        }

        .job-id {
            font-family: 'Courier New', monospace;
            color: #79c0ff;
            word-break: break-all;
        }

        .timestamp {
            color: #8b949e;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Job Queue</h1>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="queue.html">Queue</a>
                <a href="receipts.html">Receipts</a>
            </div>
        </header>

        <div id="error-container"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="pending-count">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="running-count">0</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-count">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failed-count">0</div>
                <div class="stat-label">Failed</div>
            </div>
        </div>

        <div class="card">
            <h2>Active Jobs</h2>
            <div id="jobs-display" class="table-wrapper loading">Loading...</div>
        </div>

        <div class="refresh-info">
            Last updated: <span id="last-updated">--:--:--</span> (auto-refresh every 30s)
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const REFRESH_INTERVAL = 30000;
        let refreshTimer;

        async function fetchQueueStats() {
            try {
                const response = await fetch(`${API_BASE}/queue/stats`);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (error) {
                showError(`Failed to fetch queue stats: ${error.message}`);
                return null;
            }
        }

        async function fetchQueueJobs() {
            try {
                const response = await fetch(`${API_BASE}/queue/jobs`);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (error) {
                showError(`Failed to fetch queue jobs: ${error.message}`);
                return null;
            }
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getBadgeClass(status) {
            const lower = status.toLowerCase();
            if (lower === 'pending') return 'badge-pending';
            if (lower === 'running') return 'badge-running';
            if (lower === 'completed') return 'badge-completed';
            if (lower === 'failed') return 'badge-failed';
            return '';
        }

        function updateQueueStats(stats) {
            document.getElementById('pending-count').textContent = stats.pending || 0;
            document.getElementById('running-count').textContent = stats.running || 0;
            document.getElementById('completed-count').textContent = stats.completed || 0;
            document.getElementById('failed-count').textContent = stats.failed || 0;
        }

        function updateJobsTable(jobs) {
            if (!jobs || jobs.length === 0) {
                document.getElementById('jobs-display').innerHTML = '<div class="empty-state">No jobs in queue</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Job ID</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Submitted</th>
                            <th>Claimed By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            jobs.forEach(job => {
                const submitTime = new Date(job.submitted_at).toLocaleString();
                const badgeClass = getBadgeClass(job.status);
                const canCancel = ['pending', 'running'].includes(job.status.toLowerCase());

                html += `
                    <tr>
                        <td><span class="job-id">${escapeHtml(job.job_id)}</span></td>
                        <td><span class="status-badge ${badgeClass}">${escapeHtml(job.status)}</span></td>
                        <td>${job.priority || 'normal'}</td>
                        <td><span class="timestamp">${submitTime}</span></td>
                        <td>${job.claimed_by ? escapeHtml(job.claimed_by) : '—'}</td>
                        <td>
                            ${canCancel ? `<button class="button danger" onclick="cancelJob('${escapeHtml(job.job_id)}')">Cancel</button>` : ''}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('jobs-display').innerHTML = html;
        }

        async function cancelJob(jobId) {
            if (!confirm(`Cancel job ${jobId}?`)) return;

            try {
                const response = await fetch(`${API_BASE}/queue/cancel/${encodeURIComponent(jobId)}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`Cancel failed: ${response.status}`);
                }

                // Refresh after cancellation
                await refresh();
            } catch (error) {
                showError(`Failed to cancel job: ${error.message}`);
            }
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleTimeString();
        }

        async function refresh() {
            clearError();
            const stats = await fetchQueueStats();
            const jobs = await fetchQueueJobs();

            if (stats) {
                updateQueueStats(stats);
            }

            if (jobs) {
                updateJobsTable(jobs);
            }

            updateTimestamp();
        }

        function startAutoRefresh() {
            refresh();
            refreshTimer = setInterval(refresh, REFRESH_INTERVAL);
        }

        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
        }

        // Start on page load
        document.addEventListener('DOMContentLoaded', startAutoRefresh);
        window.addEventListener('beforeunload', stopAutoRefresh);
    </script>
</body>
</html>
